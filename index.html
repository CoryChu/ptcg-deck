<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PTCG Deck">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="manifest" href="manifest.json">
  <title>PTCG Deck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --card-w: 63mm;
      --card-h: 88mm;
      --page-w: 297mm;
      --page-h: 210mm;
      --grid-offset-top: 12mm;
      --grid-offset-left: 12mm;
      --col-gap: 8mm;
      --row-gap: 10mm;
      --crop-color: #a1a1aa;
      --crop-offset: 2mm;
      --crop-length: 4mm;
      --crop-thickness: 0.2mm;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Screen UI ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header-brand {
      display: flex;
      align-items: flex-end;
    }

    .header-brand-core {
      display: flex;
      align-items: flex-end;
      gap: 0.45rem;
    }

    .app-logo {
      height: 72px;
      width: auto;
      max-width: 320px;
      display: block;
      object-fit: contain;
    }

    .app-version {
      font-size: 0.68rem;
      font-weight: 500;
      color: #64748b;
      letter-spacing: 0.03em;
      line-height: 1;
      padding-bottom: 0.45rem;
      white-space: nowrap;
      user-select: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn-text-short { display: none; }

    .btn {
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      color: #fff;
      background: var(--accent);
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

    .btn-danger {
      color: var(--danger);
      background: transparent;
      border: 1px solid var(--danger);
    }

    .btn-danger:hover:not(:disabled) { background: rgba(239, 68, 68, 0.15); }

    .deck-status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-right: 0.5rem;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drop-zone {
      margin: 1.5rem;
      padding: 3rem 2rem;
      border: 2px dashed var(--border);
      border-radius: 12px;
      text-align: center;
      color: var(--muted);
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.08);
      color: var(--text);
    }

    .drop-zone p { font-size: 1rem; margin-top: 0.5rem; }
    .drop-zone { cursor: pointer; }

    .hidden-input { display: none; }

    .preview-section {
      flex: 1;
      padding: 0 1.5rem 1.5rem;
      overflow-y: auto;
    }

    .preview-section h2 {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .preview-card-img {
      width: 100%;
      aspect-ratio: 63 / 88;
      object-fit: cover;
      display: block;
      background: #000;
      cursor: zoom-in;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .preview-card-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      gap: 0.5rem;
      touch-action: manipulation;
    }

    .qty-group {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      touch-action: manipulation;
    }

    .qty-group button {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .qty-group button:hover { border-color: var(--accent); }

    .qty-group input {
      width: 44px;
      text-align: center;
      padding: 0.25rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 6px;
      font-size: 16px;
      touch-action: manipulation;
    }

    .image-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 11000;
      background: rgba(0, 0, 0, 0.94);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(1rem, env(safe-area-inset-top)) 1rem max(1rem, env(safe-area-inset-bottom));
    }

    .image-lightbox.is-open {
      display: flex;
    }

    .image-lightbox-toolbar {
      position: absolute;
      top: max(0.75rem, env(safe-area-inset-top));
      right: max(0.75rem, env(safe-area-inset-right));
      z-index: 1;
    }

    .image-lightbox img {
      max-width: 100%;
      max-height: calc(100vh - 5rem);
      max-height: calc(100dvh - 5rem);
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .image-lightbox-hint {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    .import-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10500;
      background: rgba(15, 23, 42, 0.88);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .import-overlay.is-open { display: flex; }

    .import-dialog {
      width: min(520px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    .import-dialog h2 {
      font-size: 1.1rem;
      margin-bottom: 0.35rem;
    }

    .import-hint {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    #importText {
      width: 100%;
      min-height: 220px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      resize: vertical;
      font-family: inherit;
    }

    .import-status {
      min-height: 1.25rem;
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0.65rem 0 0.75rem;
    }

    .import-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .card-pick-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10600;
      background: rgba(15, 23, 42, 0.92);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card-pick-overlay.is-open { display: flex; }

    .card-pick-dialog {
      width: min(640px, 100%);
      max-height: min(90vh, 90dvh);
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    .card-pick-dialog h2 {
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }

    .card-pick-hint {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-pick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 0.65rem;
      margin: 1rem 0;
      max-height: 52vh;
      overflow-y: auto;
      padding: 0.15rem;
    }

    .card-pick-item {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.3rem;
      padding: 0.35rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .card-pick-item:hover,
    .card-pick-item:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .card-pick-item img {
      width: 100%;
      aspect-ratio: 63 / 88;
      object-fit: cover;
      border-radius: 4px;
      background: #000;
      display: block;
    }

    .card-pick-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
      word-break: break-all;
      line-height: 1.2;
    }

    .card-pick-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn-delete {
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      color: var(--danger);
      background: transparent;
      border: 1px solid var(--danger);
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-delete:hover { background: rgba(239, 68, 68, 0.15); }

    .empty-hint {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 1rem 0;
    }

    /* ── Print layout (hidden on screen) ── */
    #print-root { display: none; }

    /* 列印與預覽共用 A4 橫向排版 */
    #print-root .print-page,
    .preview-pages .print-page {
      position: relative;
      width: var(--page-w);
      height: var(--page-h);
      box-sizing: border-box;
      overflow: hidden;
      background: #fff;
    }

    #print-root .grid-container,
    .preview-pages .grid-container {
      position: absolute;
      top: var(--grid-offset-top);
      left: var(--grid-offset-left);
      display: grid;
      grid-template-columns: repeat(4, 63mm);
      grid-template-rows: repeat(2, 88mm);
      column-gap: var(--col-gap);
      row-gap: var(--row-gap);
    }

    #print-root .print-card,
    .preview-pages .print-card {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      overflow: visible;
    }

    #print-root .print-card img,
    .preview-pages .print-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    #print-root .print-card .mark,
    .preview-pages .print-card .mark {
      position: absolute;
      background: var(--crop-color);
      pointer-events: none;
    }

    #print-root .print-card .mark-tl-h,
    .preview-pages .print-card .mark-tl-h {
      top: calc(-1 * var(--crop-offset) - var(--crop-thickness));
      left: calc(-1 * var(--crop-offset) - var(--crop-length));
      width: var(--crop-length);
      height: var(--crop-thickness);
    }
    #print-root .print-card .mark-tl-v,
    .preview-pages .print-card .mark-tl-v {
      top: calc(-1 * var(--crop-offset) - var(--crop-length));
      left: calc(-1 * var(--crop-offset) - var(--crop-thickness));
      width: var(--crop-thickness);
      height: var(--crop-length);
    }
    #print-root .print-card .mark-tr-h,
    .preview-pages .print-card .mark-tr-h {
      top: calc(-1 * var(--crop-offset) - var(--crop-thickness));
      right: calc(-1 * var(--crop-offset) - var(--crop-length));
      width: var(--crop-length);
      height: var(--crop-thickness);
    }
    #print-root .print-card .mark-tr-v,
    .preview-pages .print-card .mark-tr-v {
      top: calc(-1 * var(--crop-offset) - var(--crop-length));
      right: calc(-1 * var(--crop-offset) - var(--crop-thickness));
      width: var(--crop-thickness);
      height: var(--crop-length);
    }
    #print-root .print-card .mark-bl-h,
    .preview-pages .print-card .mark-bl-h {
      bottom: calc(-1 * var(--crop-offset) - var(--crop-thickness));
      left: calc(-1 * var(--crop-offset) - var(--crop-length));
      width: var(--crop-length);
      height: var(--crop-thickness);
    }
    #print-root .print-card .mark-bl-v,
    .preview-pages .print-card .mark-bl-v {
      bottom: calc(-1 * var(--crop-offset) - var(--crop-length));
      left: calc(-1 * var(--crop-offset) - var(--crop-thickness));
      width: var(--crop-thickness);
      height: var(--crop-length);
    }
    #print-root .print-card .mark-br-h,
    .preview-pages .print-card .mark-br-h {
      bottom: calc(-1 * var(--crop-offset) - var(--crop-thickness));
      right: calc(-1 * var(--crop-offset) - var(--crop-length));
      width: var(--crop-length);
      height: var(--crop-thickness);
    }
    #print-root .print-card .mark-br-v,
    .preview-pages .print-card .mark-br-v {
      bottom: calc(-1 * var(--crop-offset) - var(--crop-length));
      right: calc(-1 * var(--crop-offset) - var(--crop-thickness));
      width: var(--crop-thickness);
      height: var(--crop-length);
    }

    /* ── 排版預覽視窗 ── */
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.96);
      flex-direction: column;
    }

    .preview-overlay.is-open { display: flex; }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .preview-toolbar span {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .preview-toolbar-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .preview-scroll {
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
    }

    .preview-pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      margin: 0 auto;
      transform: scale(0.55);
      transform-origin: top center;
      padding-bottom: 2rem;
    }

    .preview-pages .print-page {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 900px) {
      .app-header {
        flex-direction: column;
        align-items: stretch;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
      }

      .header-brand {
        width: 100%;
        justify-content: center;
      }

      .header-brand-core {
        position: relative;
        display: block;
      }

      .app-logo {
        height: 52px;
        margin: 0;
      }

      .app-version {
        position: absolute;
        left: 100%;
        bottom: 0.3rem;
        margin-left: 0.35rem;
        font-size: 0.62rem;
        padding-bottom: 0;
      }

      .header-actions {
        flex-direction: column;
        align-items: stretch;
        gap: 0.35rem;
      }

      .header-actions-bar {
        flex-wrap: nowrap;
        justify-content: flex-start;
        gap: 0.3rem;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 2px;
      }

      .header-actions-bar::-webkit-scrollbar { display: none; }

      .header-actions-bar .btn {
        flex-shrink: 0;
        padding: 0.42rem 0.5rem;
        font-size: 0.72rem;
        min-height: 38px;
        white-space: nowrap;
      }

      .header-actions-bar .btn-text-full { display: none; }
      .header-actions-bar .btn-text-short { display: inline; }

      .deck-status {
        width: 100%;
        text-align: center;
        margin-right: 0;
        max-width: none;
        font-size: 0.72rem;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .btn {
        padding: 0.65rem 0.85rem;
        font-size: 0.85rem;
        min-height: 44px;
      }

      .drop-zone {
        margin: 1rem;
        padding: 2rem 1rem;
      }

      .preview-section { padding: 0 1rem 1rem; }

      .preview-grid {
        grid-template-columns: repeat(auto-fill, minmax(152px, 1fr));
        gap: 0.75rem;
      }

      .preview-card-controls {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 0.3rem;
        padding: 0.35rem 0.45rem;
      }

      .qty-group {
        gap: 0.15rem;
        flex-shrink: 1;
        min-width: 0;
      }

      .qty-group button {
        width: 30px;
        height: 30px;
        font-size: 1rem;
        flex-shrink: 0;
      }

      .qty-group input {
        width: 34px;
        min-height: 30px;
        padding: 0.1rem;
        flex-shrink: 0;
      }

      .btn-delete {
        width: auto;
        min-height: 30px;
        min-width: 2.4rem;
        padding: 0.2rem 0.35rem;
        font-size: 0.72rem;
        line-height: 1.2;
        text-align: center;
        touch-action: manipulation;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .preview-pages { transform: scale(0.32); }
    }

    @media print {
      body > *:not(#print-root) { display: none !important; }
      #print-root { display: block !important; }

      @page {
        size: A4 landscape;
        margin: 0;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: #fff;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      #print-root .print-page {
        page-break-after: always;
      }

      #print-root .print-page:last-child {
        page-break-after: auto;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <div class="header-brand-core">
        <img class="app-logo" src="assets/logo.png" alt="Pokémon Trading Card Game">
        <span class="app-version" id="appVersion">v1.0.1</span>
      </div>
    </div>
    <div class="header-actions">
      <span id="deckStatus" class="deck-status"></span>
      <div class="header-actions-bar">
        <button id="btnPreview" class="btn btn-secondary" disabled>
          <span class="btn-text-full">預覽</span><span class="btn-text-short">預覽</span>
        </button>
        <button id="btnSaveDeck" class="btn btn-secondary" disabled>
          <span class="btn-text-full">Save Deck</span><span class="btn-text-short">儲存</span>
        </button>
        <button id="btnOpenDeck" class="btn btn-secondary">
          <span class="btn-text-full">Open Deck</span><span class="btn-text-short">開啟</span>
        </button>
        <button id="btnImportDeck" class="btn btn-secondary" type="button">
          <span class="btn-text-full">匯入 Deck</span><span class="btn-text-short">匯入</span>
        </button>
        <button id="btnClear" class="btn btn-danger" disabled>
          <span class="btn-text-full">Clear</span><span class="btn-text-short">清空</span>
        </button>
      </div>
    </div>
  </header>

  <input type="file" id="fileInputImages" class="hidden-input" accept="image/*" multiple>
  <input type="file" id="fileInputDeck" class="hidden-input" accept=".ptcgdeck,.json,application/json">

  <div id="dropZone" class="drop-zone">
    <strong>拖放或點擊選擇卡牌圖片</strong>
    <p>支援本機檔案，亦可直接從網頁拖入圖片</p>
  </div>

  <section class="preview-section">
    <h2>卡牌清單</h2>
    <div id="previewGrid" class="preview-grid"></div>
    <p id="emptyHint" class="empty-hint">尚未加入任何卡牌</p>
  </section>

  <div id="print-root"></div>

  <script src="assets/jspdf.umd.min.js" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js'"></script>

  <div id="importOverlay" class="import-overlay" role="dialog" aria-modal="true" aria-label="匯入 Deck">
    <div class="import-dialog">
      <h2>匯入 Deck（文字）</h2>
      <p class="import-hint">每行一張卡。程式會到寶可夢卡牌網搜尋圖片；若有多個版本會顯示圖片供你選擇。</p>
      <textarea id="importText"></textarea>
      <p id="importStatus" class="import-status"></p>
      <div class="import-actions">
        <button id="btnCancelImport" class="btn btn-secondary" type="button">取消</button>
        <button id="btnRunImport" class="btn btn-primary" type="button">開始匯入</button>
      </div>
    </div>
  </div>

  <div id="cardPickOverlay" class="card-pick-overlay" role="dialog" aria-modal="true" aria-label="選擇卡牌">
    <div class="card-pick-dialog">
      <h2 id="cardPickTitle">選擇卡牌</h2>
      <p id="cardPickHint" class="card-pick-hint"></p>
      <div id="cardPickGrid" class="card-pick-grid"></div>
      <div class="card-pick-actions">
        <button id="btnSkipPick" class="btn btn-secondary" type="button">跳過此卡</button>
        <button id="btnCancelPick" class="btn btn-danger" type="button">取消匯入</button>
      </div>
    </div>
  </div>

  <div id="imageLightbox" class="image-lightbox" role="dialog" aria-modal="true" aria-label="卡牌大圖預覽">
    <div class="image-lightbox-toolbar">
      <button id="btnCloseLightbox" class="btn btn-secondary" type="button">關閉</button>
    </div>
    <img id="lightboxImg" src="" alt="">
    <p class="image-lightbox-hint">點擊背景或按關閉返回</p>
  </div>

  <div id="previewOverlay" class="preview-overlay">
    <div class="preview-toolbar">
      <span id="previewInfo">排版預覽</span>
      <div class="preview-toolbar-actions">
        <button id="btnClosePreview" class="btn btn-secondary" type="button">關閉</button>
        <button id="btnPrint" class="btn btn-primary" type="button">列印</button>
        <button id="btnPdf" class="btn btn-primary" type="button">PDF</button>
      </div>
    </div>
    <div class="preview-scroll">
      <div id="previewRoot" class="preview-pages"></div>
    </div>
  </div>

  <script>
    const isElectron = typeof window !== 'undefined'
      && typeof window.process === 'object'
      && window.process?.type === 'renderer'
      && typeof require === 'function';

    const ipcRenderer = isElectron ? require('electron').ipcRenderer : null;

    const APP_VERSION = '1.0.1';
    const CARDS_PER_PAGE = 8;
    const DECK_VERSION = 1;
    const cards = [];
    let nextId = 1;
    let currentDeckPath = null;

    const dropZone = document.getElementById('dropZone');
    const previewGrid = document.getElementById('previewGrid');
    const emptyHint = document.getElementById('emptyHint');
    const btnPreview = document.getElementById('btnPreview');
    const btnPrint = document.getElementById('btnPrint');
    const btnPdf = document.getElementById('btnPdf');
    const btnSaveDeck = document.getElementById('btnSaveDeck');
    const btnOpenDeck = document.getElementById('btnOpenDeck');
    const btnImportDeck = document.getElementById('btnImportDeck');
    const btnClear = document.getElementById('btnClear');
    const importOverlay = document.getElementById('importOverlay');
    const importText = document.getElementById('importText');
    const importStatus = document.getElementById('importStatus');
    const btnCancelImport = document.getElementById('btnCancelImport');
    const btnRunImport = document.getElementById('btnRunImport');
    const cardPickOverlay = document.getElementById('cardPickOverlay');
    const cardPickTitle = document.getElementById('cardPickTitle');
    const cardPickHint = document.getElementById('cardPickHint');
    const cardPickGrid = document.getElementById('cardPickGrid');
    const btnSkipPick = document.getElementById('btnSkipPick');
    const btnCancelPick = document.getElementById('btnCancelPick');
    const PTCG_SEARCH_REFERER = 'https://asia.pokemon-card.com/hk/card-search/';
    let cardPickResolve = null;
    const deckStatus = document.getElementById('deckStatus');
    document.getElementById('appVersion').textContent = `v${APP_VERSION}`;
    const printRoot = document.getElementById('print-root');
    const previewOverlay = document.getElementById('previewOverlay');
    const previewRoot = document.getElementById('previewRoot');
    const previewInfo = document.getElementById('previewInfo');
    const btnClosePreview = document.getElementById('btnClosePreview');
    const imageLightbox = document.getElementById('imageLightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const btnCloseLightbox = document.getElementById('btnCloseLightbox');
    const fileInputImages = document.getElementById('fileInputImages');
    const fileInputDeck = document.getElementById('fileInputDeck');

    function downloadFile(filename, content, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function saveDeckFile(deckData) {
      if (isElectron) {
        return ipcRenderer.invoke('save-deck', deckData);
      }
      const name = currentDeckPath || 'my-deck.ptcgdeck';
      const filename = name.includes('.') ? name.split('/').pop() : name;
      downloadFile(filename, JSON.stringify(deckData, null, 2), 'application/json');
      return { ok: true, filePath: filename };
    }

    async function openDeckFile() {
      if (isElectron) {
        return ipcRenderer.invoke('open-deck');
      }
      return new Promise((resolve) => {
        fileInputDeck.onchange = () => {
          const file = fileInputDeck.files[0];
          fileInputDeck.value = '';
          if (!file) {
            resolve({ ok: false });
            return;
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const deckData = JSON.parse(e.target.result);
              resolve({ ok: true, filePath: file.name, deckData });
            } catch {
              resolve({ ok: false, error: '無效的牌組檔案' });
            }
          };
          reader.onerror = () => resolve({ ok: false });
          reader.readAsText(file);
        };
        fileInputDeck.click();
      });
    }

    const PDF_LAYOUT = {
      pageW: 297,
      pageH: 210,
      marginL: 12,
      marginT: 12,
      cardW: 63,
      cardH: 88,
      colGap: 8,
      rowGap: 10,
      cols: 4,
    };

    function drawCropMarks(pdf, x, y, w, h) {
      const offset = 2;
      const len = 4;
      pdf.setDrawColor(161, 161, 170);
      pdf.setLineWidth(0.2);
      pdf.line(x - offset - len, y - offset, x - offset, y - offset);
      pdf.line(x - offset, y - offset - len, x - offset, y - offset);
      pdf.line(x + w + offset, y - offset, x + w + offset + len, y - offset);
      pdf.line(x + w + offset, y - offset - len, x + w + offset, y - offset);
      pdf.line(x - offset - len, y + h + offset, x - offset, y + h + offset);
      pdf.line(x - offset, y + h + offset, x - offset, y + h + offset + len);
      pdf.line(x + w + offset, y + h + offset, x + w + offset + len, y + h + offset);
      pdf.line(x + w + offset, y + h + offset, x + w + offset, y + h + offset + len);
    }

    function imageFormatForPdf(dataUrl) {
      if (dataUrl.startsWith('data:image/png')) return 'PNG';
      return 'JPEG';
    }

    function ensurePdfImageData(dataUrl) {
      if (dataUrl.startsWith('data:image/jpeg') || dataUrl.startsWith('data:image/png')) {
        return Promise.resolve(dataUrl);
      }
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext('2d').drawImage(img, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.95));
        };
        img.onerror = () => reject(new Error('image convert failed'));
        img.src = dataUrl;
      });
    }

    async function downloadPdfWithJsPdf(flatCards) {
      if (!window.jspdf?.jsPDF) {
        throw new Error('jsPDF 未載入');
      }

      const { jsPDF } = window.jspdf;
      const L = PDF_LAYOUT;
      let pdf = null;

      for (let i = 0; i < flatCards.length; i++) {
        const slot = i % CARDS_PER_PAGE;

        if (slot === 0) {
          if (pdf) pdf.addPage([L.pageW, L.pageH], 'landscape');
          else pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        }

        const col = slot % L.cols;
        const row = Math.floor(slot / L.cols);
        const x = L.marginL + col * (L.cardW + L.colGap);
        const y = L.marginT + row * (L.cardH + L.rowGap);

        const imgData = await ensurePdfImageData(flatCards[i].src);
        const format = imageFormatForPdf(imgData);
        pdf.addImage(imgData, format, x, y, L.cardW, L.cardH);
        drawCropMarks(pdf, x, y, L.cardW, L.cardH);
      }

      if (isElectron) {
        const arrayBuffer = pdf.output('arraybuffer');
        return ipcRenderer.invoke('save-pdf-buffer', arrayBuffer);
      }

      pdf.save('ptcg-cards.pdf');
      return { ok: true, filePath: 'ptcg-cards.pdf' };
    }

    async function downloadPdf() {
      const flatCards = expandCards();
      if (flatCards.length === 0) return { ok: false };
      return downloadPdfWithJsPdf(flatCards);
    }

    function updateUI() {
      const hasCards = cards.length > 0;
      const totalQty = cards.reduce((sum, c) => sum + c.quantity, 0);
      const canOutput = hasCards && totalQty > 0;
      btnPreview.disabled = !canOutput;
      btnSaveDeck.disabled = !hasCards;
      btnClear.disabled = !hasCards;
      emptyHint.style.display = hasCards ? 'none' : 'block';
      previewGrid.style.display = hasCards ? 'grid' : 'none';
      deckStatus.textContent = currentDeckPath
        ? currentDeckPath.split('/').pop()
        : (hasCards ? '未儲存的牌組' : '');
    }

    function addCardFromSrc(name, src, quantity = 1, options = {}) {
      cards.push({
        id: nextId++,
        name,
        src,
        quantity: Math.max(0, Math.min(999, Number(quantity) || 1)),
      });
      if (!options.skipRender) {
        renderPreview();
        updateUI();
      }
    }

    function parseDeckLine(line) {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('#')) return null;
      const withZhang = trimmed.match(/^(.+?)\s+(\d+)\s*[张張]\s*$/);
      if (withZhang) {
        return {
          name: withZhang[1].trim(),
          quantity: Math.min(999, parseInt(withZhang[2], 10) || 1),
        };
      }
      const withX = trimmed.match(/^(.+?)\s+[xX×]\s*(\d+)\s*$/);
      if (withX) {
        return {
          name: withX[1].trim(),
          quantity: Math.min(999, parseInt(withX[2], 10) || 1),
        };
      }
      return { name: trimmed, quantity: 1 };
    }

    function parseDeckText(text) {
      return text.split(/\r?\n/).map(parseDeckLine).filter(Boolean);
    }

    async function searchPokemonCardsApi(keyword) {
      if (isElectron) {
        return ipcRenderer.invoke('search-pokemon-cards', keyword);
      }
      const res = await fetch(`/api/search-cards?keyword=${encodeURIComponent(keyword)}`);
      return res.json();
    }

    function getCardThumbUrl(imageUrl) {
      if (isElectron) return imageUrl;
      return `/api/fetch-image?url=${encodeURIComponent(imageUrl)}&referer=${encodeURIComponent(PTCG_SEARCH_REFERER)}`;
    }

    function closeCardPickOverlay(result) {
      cardPickOverlay.classList.remove('is-open');
      cardPickGrid.innerHTML = '';
      if (cardPickResolve) {
        const resolve = cardPickResolve;
        cardPickResolve = null;
        resolve(result);
      }
    }

    function pickCardFromUrls(name, quantity, urls) {
      return new Promise((resolve) => {
        cardPickResolve = resolve;
        cardPickTitle.textContent = `選擇卡牌：${name}`;
        cardPickHint.textContent = `找到 ${urls.length} 個版本，請點選要匯入的卡牌（數量：${quantity} 張）`;
        cardPickGrid.innerHTML = urls.map((url) => {
          const file = url.split('/').pop();
          return `<button type="button" class="card-pick-item" data-url="${encodeURIComponent(url)}" aria-label="${name} ${file}">
            <img src="${getCardThumbUrl(url)}" alt="" loading="lazy">
            <span class="card-pick-label">${file}</span>
          </button>`;
        }).join('');
        cardPickOverlay.classList.add('is-open');
      });
    }

    function openImportDialog() {
      importStatus.textContent = '';
      importOverlay.classList.add('is-open');
      importText.focus();
    }

    function closeImportDialog() {
      importOverlay.classList.remove('is-open');
      importStatus.textContent = '';
    }

    async function importDeckFromText(text) {
      const entries = parseDeckText(text);
      if (entries.length === 0) {
        return { ok: false, error: '沒有可解析的卡牌行' };
      }

      const summary = { added: 0, failed: [], skipped: [] };
      currentDeckPath = null;
      btnRunImport.disabled = true;

      for (let i = 0; i < entries.length; i++) {
        const { name, quantity } = entries[i];
        const progress = `搜尋中 (${i + 1}/${entries.length})：${name}…`;
        importStatus.textContent = progress;
        deckStatus.textContent = progress;

        let searchResult;
        try {
          searchResult = await searchPokemonCardsApi(name);
        } catch {
          summary.failed.push(`${name}（搜尋失敗）`);
          continue;
        }

        if (!searchResult.ok || searchResult.images.length === 0) {
          summary.failed.push(`${name}（找不到圖片）`);
          continue;
        }

        const urls = searchResult.images;
        let targetUrl = urls[0];

        if (urls.length > 1) {
          const picked = await pickCardFromUrls(name, quantity, urls);
          if (picked === '__CANCEL__') {
            summary.cancelled = true;
            break;
          }
          if (!picked) {
            summary.skipped.push(name);
            continue;
          }
          targetUrl = picked;
        }

        try {
          const dataUrl = await fetchImageAsDataUrl(targetUrl);
          if (!(await validateImageDataUrl(dataUrl))) throw new Error('invalid');
          const file = targetUrl.split('/').pop();
          addCardFromSrc(`${name}-${file}`, dataUrl, quantity, { skipRender: true });
          summary.added += 1;
        } catch {
          summary.failed.push(`${name}（圖片下載失敗）`);
        }
      }

      renderPreview();
      updateUI();
      btnRunImport.disabled = false;

      let message = summary.cancelled
        ? `匯入已取消，已加入 ${summary.added} 張卡牌`
        : `已匯入 ${summary.added} 張卡牌`;
      if (summary.skipped.length > 0) {
        message += `；已跳過：${summary.skipped.join('、')}`;
      }
      if (summary.failed.length > 0) {
        message += `；失敗：${summary.failed.join('、')}`;
      }
      return { ok: true, message, summary };
    }

    function addCardFromFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          addCardFromSrc(file.name, e.target.result);
          resolve();
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function handleFiles(fileList) {
      const imageFiles = dedupeImageFiles(
        Array.from(fileList).filter((f) => f.type.startsWith('image/'))
      );
      if (imageFiles.length === 0) return;
      addCardFromFile(pickBestImageFile(imageFiles));
    }

    function filenameFromUrl(url) {
      try {
        const pathname = new URL(url).pathname;
        const base = pathname.split('/').pop();
        return base && base.includes('.') ? base : 'web-image.png';
      } catch {
        return 'web-image.png';
      }
    }

    function isPageUrl(url) {
      try {
        const { pathname } = new URL(url);
        const p = pathname.toLowerCase();
        if (/\.(html?|php|asp|aspx|jsp)(\?|#|$)/i.test(p)) return true;
        if (/\/(search|card-search|deck|products?)(\/|$)/i.test(p)) return true;
        if (p.endsWith('/') && !/\.(png|jpe?g|webp|gif|bmp|avif)(\?|#|$)/i.test(p)) return true;
      } catch {
        return false;
      }
      return false;
    }

    function isLikelyImageUrl(url) {
      if (!url || url.startsWith('blob:')) return false;
      if (url.startsWith('data:image/')) return true;
      if (isPageUrl(url)) return false;
      if (/\.(png|jpe?g|webp|gif|bmp|avif)(\?|#|$)/i.test(url)) return true;
      if (/\/(images?|img|media|assets|uploads?|card-img|card_image|pokemon|tcg)/i.test(url)) return true;
      return false;
    }

    function scoreImageUrl(url) {
      let score = 0;
      if (/\.(png|jpe?g|webp)(\?|#|$)/i.test(url)) score += 30;
      if (/thumb|thumbnail|small|icon|logo|sprite|1x1|pixel|placeholder/i.test(url)) score -= 40;
      if (/card|pokemon|tcg/i.test(url)) score += 10;
      score += Math.min(url.length, 200) / 20;
      return score;
    }

    function urlDedupeKey(url) {
      try {
        const u = new URL(url);
        return `${u.origin}${u.pathname}`;
      } catch {
        return url;
      }
    }

    function pickBestImageUrls(urls, maxCount = 1) {
      const byKey = new Map();
      for (const url of urls) {
        if (!isLikelyImageUrl(url)) continue;
        const key = urlDedupeKey(url);
        const existing = byKey.get(key);
        if (!existing || scoreImageUrl(url) > scoreImageUrl(existing)) {
          byKey.set(key, url);
        }
      }
      const candidates = [...byKey.values()].sort((a, b) => scoreImageUrl(b) - scoreImageUrl(a));
      return candidates.slice(0, maxCount);
    }

    function dedupeImageFiles(files) {
      const seen = new Set();
      return files.filter((file) => {
        if (!file?.type?.startsWith('image/')) return false;
        const key = `${file.name}|${file.size}|${file.lastModified}|${file.type}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function pickBestImageFile(files) {
      if (files.length === 0) return null;
      return [...files].sort((a, b) => b.size - a.size)[0];
    }

    function resolveUrl(src) {
      if (!src || src.startsWith('data:')) return src;
      try {
        return new URL(src, window.location.href).href;
      } catch {
        return src;
      }
    }

    function parseSrcset(srcset) {
      const candidates = srcset.split(',').map((part) => {
        const bits = part.trim().split(/\s+/);
        const w = parseInt(bits[1], 10) || 0;
        return { url: bits[0], w };
      }).filter((c) => c.url);
      candidates.sort((a, b) => b.w - a.w);
      return candidates[0]?.url || null;
    }

    function bestUrlFromImg(img) {
      const srcset = img.getAttribute('srcset') || img.getAttribute('data-srcset');
      if (srcset) {
        const best = parseSrcset(srcset);
        if (best) return resolveUrl(best);
      }
      for (const attr of ['data-src', 'data-original', 'data-lazy-src', 'src']) {
        const val = img.getAttribute(attr);
        if (val) return resolveUrl(val);
      }
      return null;
    }

    function addUrlsFromImg(img, urls) {
      const best = bestUrlFromImg(img);
      if (best && isLikelyImageUrl(best)) urls.add(best);
    }

    function parseHtmlForUrls(html, urls) {
      if (!html) return;
      const doc = new DOMParser().parseFromString(html, 'text/html');
      doc.querySelectorAll('img').forEach((img) => addUrlsFromImg(img, urls));
      doc.querySelectorAll('[style*="background"]').forEach((el) => {
        const match = el.getAttribute('style')?.match(/url\(["']?([^"')]+)["']?\)/i);
        if (match?.[1]) {
          const resolved = resolveUrl(match[1]);
          if (isLikelyImageUrl(resolved)) urls.add(resolved);
        }
      });
    }

    function refererForUrl(url) {
      try {
        return `${new URL(url).origin}/`;
      } catch {
        return '';
      }
    }

    function urlFetchVariants(url) {
      const variants = [url];
      try {
        const u = new URL(url);
        const noQuery = u.origin + u.pathname;
        if (noQuery !== url) variants.push(noQuery);
      } catch {
        // keep original only
      }
      return [...new Set(variants)];
    }

    async function extractImageUrlsAsync(dt) {
      const urls = new Set();

      parseHtmlForUrls(dt.getData('text/html'), urls);

      const uriList = dt.getData('text/uri-list') || dt.getData('text/plain') || '';
      uriList.split('\n').forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#')) return;
        if (isLikelyImageUrl(trimmed)) urls.add(resolveUrl(trimmed));
      });

      if (dt.items) {
        const tasks = [];
        for (const item of dt.items) {
          if (item.kind === 'string' && item.type === 'text/html') {
            tasks.push(new Promise((resolve) => {
              item.getAsString((html) => {
                parseHtmlForUrls(html, urls);
                resolve();
              });
            }));
          }
          if (item.kind === 'string' && item.type === 'text/uri-list') {
            tasks.push(new Promise((resolve) => {
              item.getAsString((text) => {
                text.split('\n').forEach((line) => {
                  const trimmed = line.trim();
                  if (trimmed && isLikelyImageUrl(trimmed)) urls.add(resolveUrl(trimmed));
                });
                resolve();
              });
            }));
          }
        }
        await Promise.all(tasks);
      }

      return [...urls];
    }

    function extractImageFiles(dt) {
      const files = [];
      if (dt.files?.length) {
        Array.from(dt.files).forEach((f) => files.push(f));
      }
      if (dt.items) {
        for (const item of dt.items) {
          if (item.kind === 'file') {
            const file = item.getAsFile();
            if (file) files.push(file);
          }
        }
      }
      return dedupeImageFiles(files);
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    function imageUrlToDataUrlViaCanvas(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext('2d').drawImage(img, 0, 0);
          try {
            resolve(canvas.toDataURL('image/png'));
          } catch (err) {
            reject(err);
          }
        };
        img.onerror = () => reject(new Error('canvas load failed'));
        img.src = url;
      });
    }

    async function fetchOneImage(url, referer) {
      if (isElectron) {
        const result = await ipcRenderer.invoke('fetch-image-url', url, referer);
        if (!result.ok) throw new Error(result.error || 'fetch failed');
        return result.dataUrl;
      }

      const proxyUrl = `/api/fetch-image?url=${encodeURIComponent(url)}&referer=${encodeURIComponent(referer)}`;
      const proxyRes = await fetch(proxyUrl);
      if (proxyRes.ok) {
        return blobToDataUrl(await proxyRes.blob());
      }

      const directRes = await fetch(url, { mode: 'cors' });
      if (directRes.ok) {
        return blobToDataUrl(await directRes.blob());
      }

      return imageUrlToDataUrlViaCanvas(url);
    }

    async function fetchImageAsDataUrl(url) {
      if (url.startsWith('data:image/')) return url;

      const referer = refererForUrl(url);
      const variants = urlFetchVariants(url);
      let lastError;

      for (const variant of variants) {
        try {
          return await fetchOneImage(variant, referer);
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error('fetch failed');
    }

    function validateImageDataUrl(dataUrl) {
      if (!dataUrl?.startsWith('data:image/')) return Promise.resolve(false);
      if (dataUrl.length < 2000) return Promise.resolve(false);
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img.naturalWidth >= 50 && img.naturalHeight >= 50);
        img.onerror = () => resolve(false);
        img.src = dataUrl;
      });
    }

    let dropLock = false;
    let lastDropAt = 0;

    async function handleDrop(dataTransfer) {
      const now = Date.now();
      if (dropLock || now - lastDropAt < 800) return;
      dropLock = true;
      lastDropAt = now;

      const imageFiles = extractImageFiles(dataTransfer);
      const allUrls = await extractImageUrlsAsync(dataTransfer);
      const bestUrl = pickBestImageUrls(allUrls, 1)[0];
      const bestFile = pickBestImageFile(imageFiles);

      if (!bestFile && !bestUrl) {
        dropLock = false;
        return;
      }

      deckStatus.textContent = '正在載入圖片…';

      try {
        // 手機拖放常同時帶小縮圖檔與完整圖片網址；大於 10KB 的檔案才優先當作原圖
        if (bestFile && bestFile.size >= 10000) {
          await addCardFromFile(bestFile);
          deckStatus.textContent = '已加入 1 張圖片';
        } else if (bestUrl) {
          const dataUrl = await fetchImageAsDataUrl(bestUrl);
          if (!(await validateImageDataUrl(dataUrl))) {
            throw new Error('invalid image');
          }
          addCardFromSrc(filenameFromUrl(bestUrl), dataUrl);
          deckStatus.textContent = '已從網頁加入 1 張圖片';
        } else if (bestFile) {
          await addCardFromFile(bestFile);
          deckStatus.textContent = '已加入 1 張圖片';
        }
      } catch {
        deckStatus.textContent = '無法載入圖片（該網站封鎖外連，請先下載再拖入）';
      } finally {
        dropLock = false;
        updateUI();
      }
    }

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('drag-over');
      handleDrop(e.dataTransfer);
    });

    dropZone.addEventListener('click', () => {
      if (Date.now() - lastDropAt < 600) return;
      fileInputImages.click();
    });

    fileInputImages.addEventListener('change', () => {
      if (fileInputImages.files.length > 0) {
        handleFiles(fileInputImages.files);
      }
      fileInputImages.value = '';
    });

    function openImageLightbox(card) {
      lightboxImg.src = card.src;
      lightboxImg.alt = card.name;
      imageLightbox.classList.add('is-open');
    }

    function closeImageLightbox() {
      imageLightbox.classList.remove('is-open');
      lightboxImg.src = '';
    }

    function renderPreview() {
      previewGrid.innerHTML = cards.map(card => `
        <div class="preview-card" data-id="${card.id}">
          <img class="preview-card-img" src="${card.src}" alt="${card.name}" data-action="view" data-id="${card.id}">
          <div class="preview-card-controls">
            <div class="qty-group">
              <button type="button" data-action="dec" data-id="${card.id}">−</button>
              <input type="number" min="0" max="999" value="${card.quantity}" data-id="${card.id}">
              <button type="button" data-action="inc" data-id="${card.id}">+</button>
            </div>
            <button type="button" class="btn-delete" data-action="del" data-id="${card.id}">刪除</button>
          </div>
        </div>
      `).join('');
    }

    let lastQtyTouchAt = 0;

    function adjustCardQuantity(card, action) {
      if (action === 'inc') {
        card.quantity = Math.min(999, card.quantity + 1);
      } else if (action === 'dec') {
        card.quantity = Math.max(0, card.quantity - 1);
      }
      renderPreview();
      updateUI();
    }

    previewGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const id = Number(btn.dataset.id);
      const card = cards.find(c => c.id === id);
      if (!card) return;

      if (btn.dataset.action === 'view') {
        openImageLightbox(card);
        return;
      }
      if (btn.dataset.action === 'inc' || btn.dataset.action === 'dec') {
        if (Date.now() - lastQtyTouchAt < 400) return;
        adjustCardQuantity(card, btn.dataset.action);
        return;
      }
      if (btn.dataset.action === 'del') {
        const idx = cards.indexOf(card);
        cards.splice(idx, 1);
        renderPreview();
        updateUI();
      }
    });

    previewGrid.addEventListener('touchend', (e) => {
      const btn = e.target.closest('[data-action="inc"], [data-action="dec"]');
      if (!btn) return;
      e.preventDefault();
      lastQtyTouchAt = Date.now();
      const id = Number(btn.dataset.id);
      const card = cards.find(c => c.id === id);
      if (!card) return;
      adjustCardQuantity(card, btn.dataset.action);
    }, { passive: false });

    previewGrid.addEventListener('change', (e) => {
      if (e.target.tagName !== 'INPUT') return;
      const id = Number(e.target.dataset.id);
      const card = cards.find(c => c.id === id);
      if (!card) return;
      const val = parseInt(e.target.value, 10);
      card.quantity = isNaN(val) ? 0 : Math.max(0, Math.min(999, val));
      e.target.value = card.quantity;
      updateUI();
    });

    function expandCards() {
      const expanded = [];
      for (const card of cards) {
        for (let i = 0; i < card.quantity; i++) {
          expanded.push(card);
        }
      }
      return expanded;
    }

    function createCardElement(card) {
      const el = document.createElement('div');
      el.className = 'print-card';
      el.innerHTML = `
        <span class="mark mark-tl-h"></span>
        <span class="mark mark-tl-v"></span>
        <span class="mark mark-tr-h"></span>
        <span class="mark mark-tr-v"></span>
        <span class="mark mark-bl-h"></span>
        <span class="mark mark-bl-v"></span>
        <span class="mark mark-br-h"></span>
        <span class="mark mark-br-v"></span>
        <img src="${card.src}" alt="">
      `;
      return el;
    }

    function buildPrintLayout(target = printRoot) {
      const flatCards = expandCards();
      if (flatCards.length === 0) return false;

      target.innerHTML = '';
      const pageCount = Math.ceil(flatCards.length / CARDS_PER_PAGE);

      for (let p = 0; p < pageCount; p++) {
        const page = document.createElement('div');
        page.className = 'print-page';

        const grid = document.createElement('div');
        grid.className = 'grid-container';

        const slice = flatCards.slice(p * CARDS_PER_PAGE, (p + 1) * CARDS_PER_PAGE);
        slice.forEach(card => grid.appendChild(createCardElement(card)));

        page.appendChild(grid);
        target.appendChild(page);
      }
      return { ok: true, pageCount, cardCount: flatCards.length };
    }

    function closePreview() {
      previewOverlay.classList.remove('is-open');
      previewRoot.innerHTML = '';
    }

    async function openPreview() {
      const result = buildPrintLayout(previewRoot);
      if (!result) return;

      await waitForImages(previewRoot);
      previewInfo.textContent = `排版預覽 · 共 ${result.pageCount} 頁 · ${result.cardCount} 張卡牌`;
      previewOverlay.classList.add('is-open');
      document.querySelector('.preview-scroll').scrollTop = 0;
    }

    function waitForImages(root) {
      const imgs = root.querySelectorAll('img');
      return Promise.all(Array.from(imgs).map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }));
    }

    function getDeckData() {
      return {
        version: DECK_VERSION,
        savedAt: new Date().toISOString(),
        cards: cards.map(({ name, src, quantity }) => ({ name, src, quantity })),
      };
    }

    function clearDeck() {
      cards.length = 0;
      nextId = 1;
      currentDeckPath = null;
      previewGrid.innerHTML = '';
      printRoot.innerHTML = '';
      closePreview();
      updateUI();
    }

    function loadDeckData(deckData) {
      if (!deckData || !Array.isArray(deckData.cards)) {
        throw new Error('無效的牌組檔案格式');
      }
      cards.length = 0;
      nextId = 1;
      for (const item of deckData.cards) {
        if (!item.src) continue;
        cards.push({
          id: nextId++,
          name: item.name || 'card',
          src: item.src,
          quantity: Math.max(0, Math.min(999, Number(item.quantity) || 1)),
        });
      }
      renderPreview();
      updateUI();
    }

    btnPreview.addEventListener('click', openPreview);

    btnClosePreview.addEventListener('click', closePreview);

    previewOverlay.addEventListener('click', (e) => {
      if (e.target === previewOverlay) closePreview();
    });

    btnCloseLightbox.addEventListener('click', closeImageLightbox);

    imageLightbox.addEventListener('click', (e) => {
      if (e.target === imageLightbox || e.target.classList.contains('image-lightbox-hint')) {
        closeImageLightbox();
      }
    });

    cardPickGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('.card-pick-item');
      if (!btn) return;
      closeCardPickOverlay(decodeURIComponent(btn.dataset.url));
    });

    btnSkipPick.addEventListener('click', () => closeCardPickOverlay(null));

    btnCancelPick.addEventListener('click', () => closeCardPickOverlay('__CANCEL__'));

    cardPickOverlay.addEventListener('click', (e) => {
      if (e.target === cardPickOverlay) closeCardPickOverlay(null);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (cardPickOverlay.classList.contains('is-open')) {
        closeCardPickOverlay(null);
        return;
      }
      if (importOverlay.classList.contains('is-open')) {
        closeImportDialog();
        return;
      }
      if (imageLightbox.classList.contains('is-open')) {
        closeImageLightbox();
        return;
      }
      if (previewOverlay.classList.contains('is-open')) {
        closePreview();
      }
    });

    btnPrint.addEventListener('click', async () => {
      if (!buildPrintLayout(printRoot).ok) return;
      await waitForImages(printRoot);
      window.print();
    });

    btnPdf.addEventListener('click', async () => {
      const statusMsg = '正在產生 PDF…';
      deckStatus.textContent = statusMsg;
      previewInfo.textContent = statusMsg;
      btnPdf.disabled = true;
      try {
        const result = await downloadPdf();
        if (result?.ok) {
          const label = isElectron
            ? result.filePath.split('/').pop()
            : 'ptcg-cards.pdf';
          const okMsg = `已下載：${label}`;
          deckStatus.textContent = okMsg;
          previewInfo.textContent = okMsg;
        } else {
          const failMsg = 'PDF 產生失敗（無卡牌或已取消）';
          deckStatus.textContent = failMsg;
          previewInfo.textContent = failMsg;
        }
      } catch (err) {
        const errMsg = `PDF 失敗：${err?.message || '未知錯誤'}`;
        deckStatus.textContent = errMsg;
        previewInfo.textContent = errMsg;
      } finally {
        btnPdf.disabled = false;
        updateUI();
      }
    });

    btnSaveDeck.addEventListener('click', async () => {
      const result = await saveDeckFile(getDeckData());
      if (result.ok) {
        currentDeckPath = result.filePath;
        updateUI();
      }
    });

    btnImportDeck.addEventListener('click', openImportDialog);

    btnCancelImport.addEventListener('click', closeImportDialog);

    importOverlay.addEventListener('click', (e) => {
      if (e.target === importOverlay) closeImportDialog();
    });

    btnRunImport.addEventListener('click', async () => {
      const text = importText.value;
      if (!text.trim()) {
        importStatus.textContent = '請貼上牌組文字';
        return;
      }
      importStatus.textContent = '準備匯入…';
      try {
        const result = await importDeckFromText(text);
        if (result.ok) {
          closeImportDialog();
          deckStatus.textContent = `匯入完成：${result.message}`;
        } else {
          importStatus.textContent = result.error || '匯入失敗';
        }
      } catch (err) {
        importStatus.textContent = `匯入失敗：${err.message}`;
      }
    });

    btnOpenDeck.addEventListener('click', async () => {
      const result = await openDeckFile();
      if (!result.ok) {
        if (result.error) alert(result.error);
        return;
      }
      try {
        loadDeckData(result.deckData);
        currentDeckPath = result.filePath;
        updateUI();
      } catch (err) {
        alert('無法開啟牌組：' + err.message);
      }
    });

    btnClear.addEventListener('click', () => {
      if (cards.length === 0) return;
      if (!confirm('確定要清空目前牌組？此動作無法復原。')) return;
      clearDeck();
    });

    updateUI();
  </script>
</body>
</html>
