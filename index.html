<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PTCG Deck">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <link rel="manifest" href="manifest.json">
  <title>PTCG Deck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --card-w: 63mm;
      --card-h: 88mm;
      --page-w: 210mm;
      --page-h: 297mm;
      --grid-cols: 3;
      --grid-rows: 3;
      --grid-offset-top: 16.5mm;
      --grid-offset-left: 10.5mm;
      --grid-offset-left-back: 11.5mm;
      --col-gap: 0mm;
      --row-gap: 0mm;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Screen UI ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header-brand {
      display: flex;
      align-items: flex-end;
    }

    .header-brand-core {
      display: flex;
      align-items: flex-end;
      gap: 0.45rem;
    }

    .app-logo {
      height: 72px;
      width: auto;
      max-width: 320px;
      display: block;
      object-fit: contain;
    }

    .app-version {
      font-size: 0.68rem;
      font-weight: 500;
      color: #64748b;
      letter-spacing: 0.03em;
      line-height: 1;
      padding-bottom: 0.45rem;
      white-space: nowrap;
      user-select: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn-text-short { display: none; }

    .btn {
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      color: #fff;
      background: var(--accent);
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

    .btn-danger {
      color: var(--danger);
      background: transparent;
      border: 1px solid var(--danger);
    }

    .btn-danger:hover:not(:disabled) { background: rgba(239, 68, 68, 0.15); }

    .deck-status {
      font-size: 0.8rem;
      color: var(--muted);
      margin-right: 0.5rem;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drop-zone {
      margin: 1.5rem;
      padding: 3rem 2rem;
      border: 2px dashed var(--border);
      border-radius: 12px;
      text-align: center;
      color: var(--muted);
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.08);
      color: var(--text);
    }

    .drop-zone p { font-size: 1rem; margin-top: 0.5rem; }
    .drop-zone { cursor: pointer; }

    .hidden-input { display: none; }

    .preview-section {
      flex: 1;
      padding: 0 1.5rem 1.5rem;
    }

    body.is-card-dragging {
      overflow: hidden;
      touch-action: none;
    }

    body.is-card-dragging .preview-section {
      touch-action: none !important;
      overscroll-behavior: none;
    }

    body.is-card-dragging .preview-grid {
      touch-action: none;
    }

    .preview-section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .preview-section h2 {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-count-badge {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .card-count-badge.is-empty {
      color: var(--muted);
      font-weight: 500;
    }

    .deck-name-input {
      flex: 1;
      min-width: 0;
      max-width: 240px;
      margin: 0 0.25rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--text);
    }

    .deck-name-input:focus {
      outline: none;
    }

    .deck-name-input::placeholder {
      color: var(--muted);
      font-weight: 500;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: grab;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .preview-card:active {
      cursor: grabbing;
    }

    .preview-card.is-dragging {
      opacity: 0.45;
      z-index: 2;
      position: relative;
    }

    .preview-card.is-drag-over {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .preview-card.is-drag-ready {
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.55);
    }

    .preview-card-img {
      width: 100%;
      aspect-ratio: 63 / 88;
      object-fit: cover;
      display: block;
      background: #000;
      cursor: inherit;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      user-drag: none;
      user-select: none;
      pointer-events: auto;
    }

    .preview-card-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      gap: 0.5rem;
      touch-action: manipulation;
      cursor: default;
    }

    .qty-group {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      touch-action: manipulation;
    }

    .qty-group button {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .qty-group button:hover { border-color: var(--accent); }

    .qty-group input {
      width: 44px;
      text-align: center;
      padding: 0.25rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 6px;
      font-size: 16px;
      touch-action: manipulation;
    }

    .image-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 11000;
      background: rgba(0, 0, 0, 0.94);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(1rem, env(safe-area-inset-top)) 1rem max(1rem, env(safe-area-inset-bottom));
    }

    .image-lightbox.is-open {
      display: flex;
    }

    .image-lightbox-toolbar {
      position: absolute;
      top: max(0.75rem, env(safe-area-inset-top));
      right: max(0.75rem, env(safe-area-inset-right));
      z-index: 1;
    }

    .image-lightbox img {
      max-width: 100%;
      max-height: calc(100vh - 5rem);
      max-height: calc(100dvh - 5rem);
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .image-lightbox-hint {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    .import-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10500;
      background: rgba(15, 23, 42, 0.88);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .import-overlay.is-open { display: flex; }

    .import-dialog {
      width: min(520px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    .import-dialog h2 {
      font-size: 1.1rem;
      margin-bottom: 0.35rem;
    }

    .import-hint {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    #importText {
      width: 100%;
      min-height: 220px;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
      resize: vertical;
      font-family: inherit;
    }

    .import-status {
      min-height: 1.25rem;
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0.65rem 0 0.75rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .import-status.is-error { color: var(--danger); }
    .import-status.is-warning { color: #f59e0b; }
    .import-status.is-success { color: #22c55e; }

    .import-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .import-actions-right {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
    }

    .card-pick-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10600;
      background: rgba(15, 23, 42, 0.92);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card-pick-overlay.is-open { display: flex; }

    .card-pick-dialog {
      width: min(640px, 100%);
      max-height: min(90vh, 90dvh);
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    .card-pick-dialog h2 {
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }

    .card-pick-hint {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-pick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 0.65rem;
      margin: 1rem 0;
      max-height: 52vh;
      overflow-y: auto;
      padding: 0.15rem;
    }

    .card-pick-item {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.3rem;
      padding: 0.35rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .card-pick-item:hover,
    .card-pick-item:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .card-pick-item img {
      width: 100%;
      aspect-ratio: 63 / 88;
      object-fit: cover;
      border-radius: 4px;
      background: #000;
      display: block;
    }

    .card-pick-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
      word-break: break-all;
      line-height: 1.2;
    }

    .card-pick-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    @media (min-width: 901px) {
      .card-pick-overlay {
        padding: 1.25rem;
      }

      .card-pick-dialog {
        width: min(1320px, 98vw);
        max-height: min(94vh, 94dvh);
        padding: 1.75rem 2rem;
      }

      .card-pick-dialog h2 {
        font-size: 1.3rem;
      }

      .card-pick-hint {
        font-size: 0.95rem;
      }

      .card-pick-grid {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1.15rem;
        max-height: 76vh;
      }

      .card-pick-item {
        padding: 0.65rem;
        border-radius: 10px;
      }

      .card-pick-item img {
        object-fit: contain;
      }

      .card-pick-label {
        font-size: 0.82rem;
      }
    }

    .btn-delete {
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      color: var(--danger);
      background: transparent;
      border: 1px solid var(--danger);
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-delete:hover { background: rgba(239, 68, 68, 0.15); }

    .empty-hint {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 1rem 0;
    }

    /* ── Print layout (hidden on screen) ── */
    #print-root { display: none; }

    /* 列印與預覽共用 A4 直向排版 */
    #print-root .print-page,
    .preview-pages .print-page {
      position: relative;
      width: var(--page-w);
      height: var(--page-h);
      box-sizing: border-box;
      overflow: hidden;
      background: #fff;
    }

    #print-root .grid-container,
    .preview-pages .grid-container {
      position: absolute;
      top: var(--grid-offset-top);
      left: var(--grid-offset-left);
      display: grid;
      grid-template-columns: repeat(3, 63mm);
      grid-template-rows: repeat(3, 88mm);
      column-gap: 0mm;
      row-gap: 0mm;
    }

    #print-root .print-page-back .grid-container,
    .preview-pages .print-page-back .grid-container {
      left: var(--grid-offset-left-back);
    }

    #print-root .print-card,
    .preview-pages .print-card {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      box-sizing: border-box;
      border: 0.2mm solid #cbd5e1;
      overflow: hidden;
    }

    #print-root .print-card img,
    .preview-pages .print-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    #print-root .print-card-empty,
    .preview-pages .print-card-empty {
      border-color: transparent;
      background: transparent;
    }

    /* ── 排版預覽視窗 ── */
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.96);
      flex-direction: column;
    }

    .preview-overlay.is-open { display: flex; }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .preview-toolbar span {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .preview-toolbar-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .preview-toolbar-actions .btn.is-active {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.2);
      color: var(--text);
    }

    .preview-scroll {
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
    }

    .preview-pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      margin: 0 auto;
      transform: scale(0.55);
      transform-origin: top center;
      padding-bottom: 2rem;
    }

    .preview-pages .print-page {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 900px) {
      .app-header {
        flex-direction: column;
        align-items: stretch;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
      }

      .header-brand {
        width: 100%;
        justify-content: center;
      }

      .header-brand-core {
        position: relative;
        display: block;
      }

      .app-logo {
        height: 52px;
        margin: 0;
      }

      .app-version {
        position: absolute;
        left: 100%;
        bottom: 0.3rem;
        margin-left: 0.35rem;
        font-size: 0.62rem;
        padding-bottom: 0;
      }

      .header-actions {
        flex-direction: column;
        align-items: stretch;
        gap: 0.35rem;
      }

      .header-actions-bar {
        flex-wrap: nowrap;
        justify-content: flex-start;
        gap: 0.4rem;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 2px;
      }

      .header-actions-bar::-webkit-scrollbar { display: none; }

      .header-actions-bar .btn {
        flex-shrink: 0;
        padding: 0.52rem 0.65rem;
        font-size: 0.8rem;
        min-height: 42px;
        white-space: nowrap;
      }

      .header-actions-bar .btn-text-full { display: none; }
      .header-actions-bar .btn-text-short { display: inline; }

      .deck-status {
        width: 100%;
        text-align: center;
        margin-right: 0;
        max-width: none;
        font-size: 0.72rem;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .btn {
        padding: 0.65rem 0.85rem;
        font-size: 0.85rem;
        min-height: 44px;
      }

      .drop-zone {
        margin: 1rem;
        padding: 2rem 1rem;
      }

      .preview-section { padding: 0 1rem 1rem; }

      .preview-section-header {
        flex-wrap: nowrap;
        gap: 0.3rem;
        align-items: center;
      }

      .preview-section h2 {
        font-size: 0.68rem;
        letter-spacing: 0.02em;
        flex-shrink: 0;
      }

      .deck-name-input {
        flex: 1;
        min-width: 0;
        max-width: none;
        margin: 0;
        padding: 0.1rem 0.2rem;
        font-size: 16px;
        font-weight: 600;
      }

      .card-count-badge {
        font-size: 0.68rem;
        flex-shrink: 0;
      }

      .preview-grid {
        grid-template-columns: repeat(auto-fill, minmax(152px, 1fr));
        gap: 0.75rem;
      }

      .preview-card.is-dragging {
        touch-action: none;
        z-index: 2;
        position: relative;
      }

      .preview-card-img {
        touch-action: pan-y;
      }

      .preview-card.is-drag-ready .preview-card-img,
      .preview-card.is-dragging .preview-card-img {
        touch-action: none;
      }

      .preview-card-controls {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 0.3rem;
        padding: 0.35rem 0.45rem;
      }

      .qty-group {
        gap: 0.15rem;
        flex-shrink: 1;
        min-width: 0;
      }

      .qty-group button {
        width: 30px;
        height: 30px;
        font-size: 1rem;
        flex-shrink: 0;
      }

      .qty-group input {
        width: 34px;
        min-height: 30px;
        padding: 0.1rem;
        flex-shrink: 0;
      }

      .btn-delete {
        width: auto;
        min-height: 30px;
        min-width: 2.4rem;
        padding: 0.2rem 0.35rem;
        font-size: 0.72rem;
        line-height: 1.2;
        text-align: center;
        touch-action: manipulation;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .preview-pages { transform: scale(0.32); }
    }

    @media print {
      body > *:not(#print-root) { display: none !important; }
      #print-root { display: block !important; }

      @page {
        size: A4 portrait;
        margin: 0;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: #fff;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      #print-root .print-page {
        page-break-after: always;
      }

      #print-root .print-page:last-child {
        page-break-after: auto;
      }

      #print-root .grid-container {
        position: absolute;
        top: 16.5mm;
        left: 10.5mm;
        grid-template-columns: repeat(3, 63mm);
        grid-template-rows: repeat(3, 88mm);
        column-gap: 0mm;
        row-gap: 0mm;
      }

      #print-root .print-page-back .grid-container {
        left: 11.5mm;
      }

      #print-root .print-card {
        width: 63mm;
        height: 88mm;
        box-sizing: border-box;
        border: 0.2mm solid #cbd5e1;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <div class="header-brand-core">
        <img class="app-logo" src="assets/logo.png" alt="Pokémon Trading Card Game">
        <span class="app-version" id="appVersion">v1.3</span>
      </div>
    </div>
    <div class="header-actions">

  <script>
    const isElectron = typeof window !== 'undefined'

    const cardPickOverlay = document.getElementById('cardPickOverlay');

    const btnCancelPick = document.getElementById('btnCancelPick');

    function downloadFile(filename, content, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function getDeckDisplayName() {
      const trimmed = deckNameInput.value.trim();
      return trimmed || DEFAULT_DECK_NAME;
    }

    function getDeckFileName() {
      const base = getDeckDisplayName()
        .replace(/[<>:"/\\|?*\x00-\x1f]/g, '-')
        .replace(/\s+/g, ' ')
        .trim() || DEFAULT_DECK_NAME;
      return base.toLowerCase().endsWith('.ptcgdeck') ? base : `${base}.ptcgdeck`;
    }

    function setDeckName(name) {
      deckNameInput.value = (name && String(name).trim()) || DEFAULT_DECK_NAME;
    }

    function deckNameFromFilePath(filePath) {
      if (!filePath) return DEFAULT_DECK_NAME;
      const base = filePath.split(/[/\\]/).pop() || '';
      return base.replace(/\.[^.]+$/, '') || DEFAULT_DECK_NAME;
    }

    function parseDeckFileText(text) {
      let deckData;
      try {
        deckData = JSON.parse(text);
      } catch {
        throw new Error('無效的牌組檔案（不是有效的 JSON）');
      }
      if (!deckData || !Array.isArray(deckData.cards)) {
        throw new Error('無效的牌組檔案格式');
      }
      return deckData;
    }

    async function saveDeckFile(deckData) {
      const filename = getDeckFileName();
      if (isElectron) {
        return ipcRenderer.invoke('save-deck', deckData, filename);
      }
      downloadFile(filename, JSON.stringify(deckData, null, 2), 'application/json');
      return { ok: true, filePath: filename };
    }

    async function openDeckFile() {
      if (isElectron) {
        return ipcRenderer.invoke('open-deck');
      }
      return new Promise((resolve) => {
        fileInputDeck.onchange = () => {
          const file = fileInputDeck.files[0];
          fileInputDeck.value = '';
          if (!file) {
            resolve({ ok: false });
            return;
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const deckData = parseDeckFileText(e.target.result);
              resolve({ ok: true, filePath: file.name, deckData });
            } catch (err) {
              resolve({ ok: false, error: err.message || '無效的牌組檔案' });
            }
          };
          reader.onerror = () => resolve({ ok: false });
          reader.readAsText(file);
        };
        fileInputDeck.click();
      });
    }

    const PDF_LAYOUT = {
      pageW: 210,
      pageH: 297,
      marginL: 10.5,
      marginLBack: 11.5,
      marginT: 16.5,
      cardW: 63,
      cardH: 88,
      colGap: 0,
      rowGap: 0,
      cols: 3,
    };

    function drawCardBorder(pdf, x, y, w, h) {
      pdf.setDrawColor(203, 213, 225);
      pdf.setLineWidth(0.2);
      pdf.rect(x, y, w, h);
    }

    function imageFormatForPdf(dataUrl) {
      if (dataUrl.startsWith('data:image/png')) return 'PNG';
      return 'JPEG';
    }

    function ensurePdfImageData(dataUrl) {
      if (dataUrl.startsWith('data:image/jpeg') || dataUrl.startsWith('data:image/png')) {
        return Promise.resolve(dataUrl);
      }
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext('2d').drawImage(img, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.95));
        };
        img.onerror = () => reject(new Error('image convert failed'));
        img.src = dataUrl;
      });
    }

    async function downloadPdfWithJsPdf(flatCards, options = {}) {
      if (!window.jspdf?.jsPDF) {
        throw new Error('jsPDF 未載入');
      }

      const { includeBackPages = false } = options;
      const { jsPDF } = window.jspdf;
      const L = PDF_LAYOUT;
      let pdf = null;
      const frontPageCount = Math.ceil(flatCards.length / CARDS_PER_PAGE);
      let backImgData = null;
      let backFormat = null;

      if (includeBackPages) {
        backImgData = await ensurePdfImageData(BACK_IMAGE_SRC);
        backFormat = imageFormatForPdf(backImgData);
      }

      function addPortraitPage() {
        if (pdf) pdf.addPage([L.pageW, L.pageH], 'portrait');
        else pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      }

      function drawCardAtSlot(imgData, format, slot, marginL = L.marginL) {
        const col = slot % L.cols;
        const row = Math.floor(slot / L.cols);
        const x = marginL + col * (L.cardW + L.colGap);
        const y = L.marginT + row * (L.cardH + L.rowGap);
        pdf.addImage(imgData, format, x, y, L.cardW, L.cardH);
        drawCardBorder(pdf, x, y, L.cardW, L.cardH);
      }

      for (let p = 0; p < frontPageCount; p++) {
        addPortraitPage();
        const slice = flatCards.slice(p * CARDS_PER_PAGE, (p + 1) * CARDS_PER_PAGE);
        const pageCards = buildPageCards(slice);

        for (let slot = 0; slot < CARDS_PER_PAGE; slot++) {
          if (!pageCards[slot]) continue;
          const imgData = await ensurePdfImageData(pageCards[slot].src);
          const format = imageFormatForPdf(imgData);
          drawCardAtSlot(imgData, format, slot);
        }

        if (includeBackPages) {
          addPortraitPage();
          for (let backSlot = 0; backSlot < CARDS_PER_PAGE; backSlot++) {
            const frontSlot = mirroredFrontSlotForBackSlot(backSlot);
            if (!pageCards[frontSlot]) continue;
            drawCardAtSlot(backImgData, backFormat, backSlot);
          }
        }
      }

      if (isElectron) {
        const arrayBuffer = pdf.output('arraybuffer');
        return ipcRenderer.invoke('save-pdf-buffer', arrayBuffer);
      }

      pdf.save('ptcg-cards.pdf');
      return { ok: true, filePath: 'ptcg-cards.pdf' };
    }

    async function downloadPdf() {
      const flatCards = expandCards();
      if (flatCards.length === 0) return { ok: false };
      return downloadPdfWithJsPdf(flatCards, { includeBackPages: doubleSidedPrint });
    }

    function updateUI() {
      const hasCards = cards.length > 0;
      const totalQty = cards.reduce((sum, c) => sum + c.quantity, 0);
      const canOutput = hasCards && totalQty > 0;
      btnPreview.disabled = !canOutput;
      btnSaveDeck.disabled = !hasCards;
      btnClear.disabled = !hasCards;
      emptyHint.style.display = hasCards ? 'none' : 'block';
      previewGrid.style.display = hasCards ? 'grid' : 'none';
      cardCountBadge.textContent = hasCards
        ? `共 ${totalQty} 張（${cards.length} 種）`
        : '共 0 張';
      cardCountBadge.classList.toggle('is-empty', totalQty === 0);
      deckStatus.textContent = currentDeckPath
        ? `已儲存：${getDeckDisplayName()}`
        : (hasCards ? '未儲存' : '');
    }

    function setImportStatus(message, tone = '') {
      importStatus.textContent = message;
      importStatus.classList.remove('is-error', 'is-warning', 'is-success');
      if (tone) importStatus.classList.add(`is-${tone}`);
    }

    function addCardFromSrc(name, src, quantity = 1, options = {}) {
      cards.push({
        id: nextId++,
        name,
        src,
        quantity: Math.max(0, Math.min(999, Number(quantity) || 1)),
      });
      if (!options.skipRender) {
        renderPreview();
        updateUI();
      }
    }

    function parseDeckLine(line) {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('#')) return null;
      const withZhang = trimmed.match(/^(.+?)\s+(\d+)\s*[张張]\s*$/);
      if (withZhang) {
        return {
          name: withZhang[1].trim(),
          quantity: Math.min(999, parseInt(withZhang[2], 10) || 1),
        };
      }
      const withX = trimmed.match(/^(.+?)\s+[xX×]\s*(\d+)\s*$/);
      if (withX) {
        return {
          name: withX[1].trim(),
          quantity: Math.min(999, parseInt(withX[2], 10) || 1),
        };
      }
      return { name: trimmed, quantity: 1 };
    }

    function parseDeckText(text) {
      return text.split(/\r?\n/).map(parseDeckLine).filter(Boolean);
    }

    async function searchPokemonCardsApi(keyword) {
      if (isElectron) {
        return ipcRenderer.invoke('search-pokemon-cards', keyword);
      }
      const res = await fetch(`/api/search-cards?keyword=${encodeURIComponent(keyword)}`);
      return res.json();
    }

    function getCardThumbUrl(imageUrl) {
      if (isElectron) return imageUrl;
      return `/api/fetch-image?url=${encodeURIComponent(imageUrl)}&referer=${encodeURIComponent(PTCG_SEARCH_REFERER)}`;
    }

    function closeCardPickOverlay(result) {
      cardPickOverlay.classList.remove('is-open');
      cardPickGrid.innerHTML = '';
      if (cardPickResolve) {
        const resolve = cardPickResolve;
        cardPickResolve = null;
        resolve(result);
      }
    }

    function pickCardFromUrls(name, quantity, urls) {
      return new Promise((resolve) => {
        cardPickResolve = resolve;
        cardPickTitle.textContent = `選擇卡牌：${name}`;
        cardPickHint.textContent = `找到 ${urls.length} 個版本，請點選要匯入的卡牌（數量：${quantity} 張）`;
        cardPickGrid.innerHTML = urls.map((url) => {
          const file = url.split('/').pop();
          return `<button type="button" class="card-pick-item" data-url="${encodeURIComponent(url)}" aria-label="${name} ${file}">
            <img src="${getCardThumbUrl(url)}" alt="" loading="lazy">
            <span class="card-pick-label">${file}</span>
          </button>`;
        }).join('');
        cardPickOverlay.classList.add('is-open');
      });
    }

    function openImportDialog() {
      setImportStatus('');
      importOverlay.classList.add('is-open');
      importText.focus();
    }

    function closeImportDialog() {
      importOverlay.classList.remove('is-open');
      setImportStatus('');
    }

    async function importDeckFromText(text) {
      const entries = parseDeckText(text);
      if (entries.length === 0) {
        return { ok: false, error: '沒有可解析的卡牌行' };
      }

      const summary = { added: 0, failed: [], skipped: [] };
      currentDeckPath = null;
      btnRunImport.disabled = true;

      for (let i = 0; i < entries.length; i++) {
        const { name, quantity } = entries[i];
        const progress = `搜尋中 (${i + 1}/${entries.length})：${name}…`;
        setImportStatus(progress);
        deckStatus.textContent = progress;

        let searchResult;
        try {
          searchResult = await searchPokemonCardsApi(name);
        } catch {
          summary.failed.push(`${name}（搜尋失敗）`);
          continue;
        }

        if (!searchResult.ok || searchResult.images.length === 0) {
          summary.failed.push(`${name}（找不到圖片）`);
          continue;
        }

        const urls = searchResult.images;
        let targetUrl = urls[0];

        if (urls.length > 1) {
          const picked = await pickCardFromUrls(name, quantity, urls);
          if (picked === '__CANCEL__') {
            summary.cancelled = true;
            break;
          }
          if (!picked) {
            summary.skipped.push(name);
            continue;
          }
          targetUrl = picked;
        }

        try {
          const dataUrl = await fetchImageAsDataUrl(targetUrl);
          if (!(await validateImageDataUrl(dataUrl))) throw new Error('invalid');
          const file = targetUrl.split('/').pop();
          addCardFromSrc(`${name}-${file}`, dataUrl, quantity, { skipRender: true });
          summary.added += 1;
        } catch {
          summary.failed.push(`${name}（圖片下載失敗）`);
        }
      }

      renderPreview();
      updateUI();
      btnRunImport.disabled = false;

      const hasIssues = summary.failed.length > 0 || summary.skipped.length > 0 || summary.cancelled;
      let message = summary.cancelled
        ? `匯入已取消，已加入 ${summary.added} 張卡牌`
        : `已匯入 ${summary.added} 張卡牌`;
      if (summary.skipped.length > 0) {
        message += `\n已跳過：${summary.skipped.join('、')}`;
      }
      if (summary.failed.length > 0) {
        message += `\n失敗：${summary.failed.join('、')}`;
      }

      if (summary.added === 0) {
        if (summary.cancelled) {
          return { ok: false, error: '匯入已取消，未加入任何卡牌', summary };
        }
        if (summary.failed.length > 0) {
          return {
            ok: false,
            error: `匯入失敗，未加入任何卡牌\n失敗：${summary.failed.join('、')}`,
            summary,
          };
        }
        if (summary.skipped.length > 0) {
          return {
            ok: false,
            error: `未加入任何卡牌\n已跳過：${summary.skipped.join('、')}`,
            summary,
          };
        }
      }

      return {
        ok: true,
        partial: hasIssues,
        message,
        summary,
      };
    }

    function addCardFromFile(file, options = {}) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          addCardFromSrc(file.name, e.target.result, 1, { skipRender: options.skipRender });
          resolve();
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function addCardsFromFiles(files) {
      const imageFiles = dedupeImageFiles(files.filter((f) => f?.type?.startsWith('image/')));
      if (imageFiles.length === 0) return 0;
      deckStatus.textContent = `正在載入 ${imageFiles.length} 張圖片…`;
      let added = 0;
      const batch = imageFiles.length > 1;
      for (const file of imageFiles) {
        try {
          await addCardFromFile(file, { skipRender: batch });
          added += 1;
        } catch {
          /* skip failed file */
        }
      }
      if (batch) {
        renderPreview();
        updateUI();
      }
      return added;
    }

    async function handleFiles(fileList) {
      const added = await addCardsFromFiles(Array.from(fileList));
      if (added > 0) {
        deckStatus.textContent = `已加入 ${added} 張圖片`;
      }
    }

    function filenameFromUrl(url) {
      try {
        const pathname = new URL(url).pathname;
        const base = pathname.split('/').pop();
        return base && base.includes('.') ? base : 'web-image.png';
      } catch {
        return 'web-image.png';
      }
    }

    function isPageUrl(url) {
      try {
        const { pathname } = new URL(url);
        const p = pathname.toLowerCase();
        if (/\.(html?|php|asp|aspx|jsp)(\?|#|$)/i.test(p)) return true;
        if (/\/(search|card-search|deck|products?)(\/|$)/i.test(p)) return true;
        if (p.endsWith('/') && !/\.(png|jpe?g|webp|gif|bmp|avif)(\?|#|$)/i.test(p)) return true;
      } catch {
        return false;
      }
      return false;
    }

    function isLikelyImageUrl(url) {
      if (!url || url.startsWith('blob:')) return false;
      if (url.startsWith('data:image/')) return true;
      if (isPageUrl(url)) return false;
      if (/\.(png|jpe?g|webp|gif|bmp|avif)(\?|#|$)/i.test(url)) return true;
      if (/\/(images?|img|media|assets|uploads?|card-img|card_image|pokemon|tcg)/i.test(url)) return true;
      return false;
    }

    function scoreImageUrl(url) {
      let score = 0;
      if (/\.(png|jpe?g|webp)(\?|#|$)/i.test(url)) score += 30;
      if (/thumb|thumbnail|small|icon|logo|sprite|1x1|pixel|placeholder/i.test(url)) score -= 40;
      if (/card|pokemon|tcg/i.test(url)) score += 10;
      score += Math.min(url.length, 200) / 20;
      return score;
    }

    function urlDedupeKey(url) {
      try {
        const u = new URL(url);
        return `${u.origin}${u.pathname}`;
      } catch {
        return url;
      }
    }

    function pickBestImageUrls(urls, maxCount = 1) {
      const byKey = new Map();
      for (const url of urls) {
        if (!isLikelyImageUrl(url)) continue;
        const key = urlDedupeKey(url);
        const existing = byKey.get(key);
        if (!existing || scoreImageUrl(url) > scoreImageUrl(existing)) {
          byKey.set(key, url);
        }
      }
      const candidates = [...byKey.values()].sort((a, b) => scoreImageUrl(b) - scoreImageUrl(a));
      return candidates.slice(0, maxCount);
    }

    function dedupeImageFiles(files) {
      const seen = new Set();
      return files.filter((file) => {
        if (!file?.type?.startsWith('image/')) return false;
        const key = `${file.name}|${file.size}|${file.lastModified}|${file.type}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function pickBestImageFile(files) {
      if (files.length === 0) return null;
      return [...files].sort((a, b) => b.size - a.size)[0];
    }

    function resolveUrl(src) {
      if (!src || src.startsWith('data:')) return src;
      try {
        return new URL(src, window.location.href).href;
      } catch {
        return src;
      }
    }

    function parseSrcset(srcset) {
      const candidates = srcset.split(',').map((part) => {
        const bits = part.trim().split(/\s+/);
        const w = parseInt(bits[1], 10) || 0;
        return { url: bits[0], w };
      }).filter((c) => c.url);
      candidates.sort((a, b) => b.w - a.w);
      return candidates[0]?.url || null;
    }

    function bestUrlFromImg(img) {
      const srcset = img.getAttribute('srcset') || img.getAttribute('data-srcset');
      if (srcset) {
        const best = parseSrcset(srcset);
        if (best) return resolveUrl(best);
      }
      for (const attr of ['data-src', 'data-original', 'data-lazy-src', 'src']) {
        const val = img.getAttribute(attr);
        if (val) return resolveUrl(val);
      }
      return null;
    }

    function addUrlsFromImg(img, urls) {
      const best = bestUrlFromImg(img);
      if (best && isLikelyImageUrl(best)) urls.add(best);
    }

    function parseHtmlForUrls(html, urls) {
      if (!html) return;
      const doc = new DOMParser().parseFromString(html, 'text/html');
      doc.querySelectorAll('img').forEach((img) => addUrlsFromImg(img, urls));
      doc.querySelectorAll('[style*="background"]').forEach((el) => {
        const match = el.getAttribute('style')?.match(/url\(["']?([^"')]+)["']?\)/i);
        if (match?.[1]) {
          const resolved = resolveUrl(match[1]);
          if (isLikelyImageUrl(resolved)) urls.add(resolved);
        }
      });
    }

    function refererForUrl(url) {
      try {
        return `${new URL(url).origin}/`;
      } catch {
        return '';
      }
    }

    function urlFetchVariants(url) {
      const variants = [url];
      try {
        const u = new URL(url);
        const noQuery = u.origin + u.pathname;
        if (noQuery !== url) variants.push(noQuery);
      } catch {
        // keep original only
      }
      return [...new Set(variants)];
    }

    async function extractImageUrlsAsync(dt) {
      const urls = new Set();

      parseHtmlForUrls(dt.getData('text/html'), urls);

      const uriList = dt.getData('text/uri-list') || dt.getData('text/plain') || '';
      uriList.split('\n').forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#')) return;
        if (isLikelyImageUrl(trimmed)) urls.add(resolveUrl(trimmed));
      });

      if (dt.items) {
        const tasks = [];
        for (const item of dt.items) {
          if (item.kind === 'string' && item.type === 'text/html') {
            tasks.push(new Promise((resolve) => {
              item.getAsString((html) => {
                parseHtmlForUrls(html, urls);
                resolve();
              });
            }));
          }
          if (item.kind === 'string' && item.type === 'text/uri-list') {
            tasks.push(new Promise((resolve) => {
              item.getAsString((text) => {
                text.split('\n').forEach((line) => {
                  const trimmed = line.trim();
                  if (trimmed && isLikelyImageUrl(trimmed)) urls.add(resolveUrl(trimmed));
                });
                resolve();
              });
            }));
          }
        }
        await Promise.all(tasks);
      }

      return [...urls];
    }

    function extractImageFiles(dt) {
      const files = [];
      if (dt.files?.length) {
        Array.from(dt.files).forEach((f) => files.push(f));
      }
      if (dt.items) {
        for (const item of dt.items) {
          if (item.kind === 'file') {
            const file = item.getAsFile();
            if (file) files.push(file);
          }
        }
      }
      return dedupeImageFiles(files);
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    function imageUrlToDataUrlViaCanvas(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext('2d').drawImage(img, 0, 0);
          try {
            resolve(canvas.toDataURL('image/png'));
          } catch (err) {
            reject(err);
          }
        };
        img.onerror = () => reject(new Error('canvas load failed'));
        img.src = url;
      });
    }

    async function fetchOneImage(url, referer) {
      if (isElectron) {
        const result = await ipcRenderer.invoke('fetch-image-url', url, referer);
        if (!result.ok) throw new Error(result.error || 'fetch failed');
        return result.dataUrl;
      }

      const proxyUrl = `/api/fetch-image?url=${encodeURIComponent(url)}&referer=${encodeURIComponent(referer)}`;
      const proxyRes = await fetch(proxyUrl);
      if (proxyRes.ok) {
        return blobToDataUrl(await proxyRes.blob());
      }

      const directRes = await fetch(url, { mode: 'cors' });
      if (directRes.ok) {
        return blobToDataUrl(await directRes.blob());
      }

      return imageUrlToDataUrlViaCanvas(url);
    }

    async function fetchImageAsDataUrl(url) {
      if (url.startsWith('data:image/')) return url;

      const referer = refererForUrl(url);
      const variants = urlFetchVariants(url);
      let lastError;

      for (const variant of variants) {
        try {
          return await fetchOneImage(variant, referer);
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error('fetch failed');
    }

    function validateImageDataUrl(dataUrl) {
      if (!dataUrl?.startsWith('data:image/')) return Promise.resolve(false);
      if (dataUrl.length < 2000) return Promise.resolve(false);
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img.naturalWidth >= 50 && img.naturalHeight >= 50);
        img.onerror = () => resolve(false);
        img.src = dataUrl;
      });
    }

    let dropLock = false;
    let lastDropAt = 0;

    async function handleDrop(dataTransfer) {
      const now = Date.now();
      if (dropLock || now - lastDropAt < 800) return;
      dropLock = true;
      lastDropAt = now;

      const imageFiles = extractImageFiles(dataTransfer);
      const substantialFiles = imageFiles.filter((f) => f.size >= 10000);
      const localFiles = substantialFiles.length > 0 ? substantialFiles : imageFiles;

      try {
        if (localFiles.length > 1) {
          const added = await addCardsFromFiles(localFiles);
          deckStatus.textContent = added > 0 ? `已加入 ${added} 張圖片` : '無法載入圖片';
          return;
        }

        const allUrls = await extractImageUrlsAsync(dataTransfer);
        const bestUrl = pickBestImageUrls(allUrls, 1)[0];
        const bestFile = pickBestImageFile(imageFiles);

        if (!bestFile && !bestUrl) return;

        deckStatus.textContent = '正在載入圖片…';

        // 手機拖放常同時帶小縮圖檔與完整圖片網址；大於 10KB 的檔案才優先當作原圖
        if (bestFile && bestFile.size >= 10000) {
          await addCardFromFile(bestFile);
          deckStatus.textContent = '已加入 1 張圖片';
        } else if (bestUrl) {
          const dataUrl = await fetchImageAsDataUrl(bestUrl);
          if (!(await validateImageDataUrl(dataUrl))) {
            throw new Error('invalid image');
          }
          addCardFromSrc(filenameFromUrl(bestUrl), dataUrl);
          deckStatus.textContent = '已從網頁加入 1 張圖片';
        } else if (bestFile) {
          await addCardFromFile(bestFile);
          deckStatus.textContent = '已加入 1 張圖片';
        }
      } catch {
        deckStatus.textContent = '無法載入圖片（該網站封鎖外連，請先下載再拖入）';
      } finally {
        dropLock = false;
        updateUI();
      }
    }

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('drag-over');
      handleDrop(e.dataTransfer);
    });

    dropZone.addEventListener('click', () => {
      if (Date.now() - lastDropAt < 600) return;
      fileInputImages.click();
    });

    fileInputImages.addEventListener('change', () => {
      if (fileInputImages.files.length > 0) {
        handleFiles(fileInputImages.files);
      }
      fileInputImages.value = '';
    });

    function openImageLightbox(card) {
      lightboxImg.src = card.src;
      lightboxImg.alt = card.name;
      imageLightbox.classList.add('is-open');
    }

    function closeImageLightbox() {
      imageLightbox.classList.remove('is-open');
      lightboxImg.src = '';
    }

    function isCardDragBlockedTarget(target) {
      return Boolean(target.closest('button, input, .qty-group, .btn-delete, .preview-card-controls'));
    }

    function canStartCardDrag(target, isTouch) {
      if (isTouch) {
        return Boolean(target.closest('.preview-card-img'));
      }
      return !isCardDragBlockedTarget(target);
    }

    function reorderCardsToTarget(fromId, toId) {
      const fromIdx = cards.findIndex((c) => c.id === fromId);
      const toIdx = cards.findIndex((c) => c.id === toId);
      if (fromIdx < 0 || toIdx < 0 || fromId === toId) return;
      const [moved] = cards.splice(fromIdx, 1);
      cards.splice(toIdx, 0, moved);
      currentDeckPath = null;
      renderPreview();
      updateUI();
    }

    function computeDropTarget(clientX, clientY, dragId) {
      if (!Number.isFinite(clientX) || !Number.isFinite(clientY)) return null;
      const draggingEl = previewGrid.querySelector(`.preview-card[data-id="${dragId}"]`);
      const prevPe = draggingEl?.style.pointerEvents ?? '';
      if (draggingEl) draggingEl.style.pointerEvents = 'none';
      let hit;
      try {
        hit = document.elementFromPoint(clientX, clientY);
      } finally {
        if (draggingEl) draggingEl.style.pointerEvents = prevPe;
      }
      const targetCard = hit?.closest('.preview-card');
      if (!targetCard) return null;
      const targetId = Number(targetCard.dataset.id);
      if (targetId === dragId) return null;
      return { targetId };
    }

    function clearCardDragOverState() {
      previewGrid.querySelectorAll('.preview-card').forEach((el) => {
        el.classList.remove('is-drag-over', 'is-drag-ready');
      });
    }

    function renderPreview() {
      previewGrid.innerHTML = cards.map(card => `
        <div class="preview-card" data-id="${card.id}">
          <img class="preview-card-img" src="${card.src}" alt="${card.name}" draggable="false" data-action="view" data-id="${card.id}">
          <div class="preview-card-controls">
            <div class="qty-group">
              <button type="button" draggable="false" data-action="dec" data-id="${card.id}">−</button>
              <input type="number" min="0" max="999" value="${card.quantity}" draggable="false" data-id="${card.id}">
              <button type="button" draggable="false" data-action="inc" data-id="${card.id}">+</button>
            </div>
            <button type="button" class="btn-delete" draggable="false" data-action="del" data-id="${card.id}">刪除</button>
          </div>
        </div>
      `).join('');
    }

    let lastQtyTouchAt = 0;
    let pointerReorder = null;
    let cardDragDidMove = false;
    let dragHoldTimer = null;
    const MOUSE_DRAG_THRESHOLD = 8;
    const TOUCH_HOLD_MS = 360;
    const TOUCH_HOLD_CANCEL_PX = 14;
    const previewSection = document.querySelector('.preview-section');
    const DRAG_EDGE_ZONE_PX = 72;
    const DRAG_MAX_SCROLL_SPEED = 22;
    let dragScrollRaf = null;

    function isTouchPointerType(type) {
      return type === 'touch';
    }

    function clearDragHoldTimer() {
      if (dragHoldTimer) {
        clearTimeout(dragHoldTimer);
        dragHoldTimer = null;
      }
    }

    function getPageScrollMax() {
      return Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    }

    function updateDragAutoScroll(clientY) {
      if (!pointerReorder?.active) return;
      const maxScroll = getPageScrollMax();
      const viewH = window.innerHeight;
      if (maxScroll <= 0) return;

      let delta = 0;
      if (clientY < DRAG_EDGE_ZONE_PX) {
        const t = 1 - Math.max(0, clientY) / DRAG_EDGE_ZONE_PX;
        delta = -Math.ceil(DRAG_MAX_SCROLL_SPEED * t);
      } else if (clientY > viewH - DRAG_EDGE_ZONE_PX) {
        const t = 1 - Math.max(0, viewH - clientY) / DRAG_EDGE_ZONE_PX;
        delta = Math.ceil(DRAG_MAX_SCROLL_SPEED * t);
      }
      if (delta) {
        const next = Math.max(0, Math.min(maxScroll, window.scrollY + delta));
        window.scrollTo(0, next);
      }
    }

    function dragScrollTick() {
      if (!pointerReorder?.active) {
        dragScrollRaf = null;
        return;
      }
      updateDragAutoScroll(pointerReorder.lastY);
      updatePointerReorderHover(pointerReorder.lastX, pointerReorder.lastY);
      dragScrollRaf = requestAnimationFrame(dragScrollTick);
    }

    function startDragScrollLoop() {
      if (!dragScrollRaf) dragScrollRaf = requestAnimationFrame(dragScrollTick);
    }

    function stopDragScrollLoop() {
      if (dragScrollRaf) {
        cancelAnimationFrame(dragScrollRaf);
        dragScrollRaf = null;
      }
    }

    function setScrollLocked(locked) {
      if (locked) {
        document.body.classList.add('is-card-dragging');
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
        if (previewSection) previewSection.style.touchAction = 'none';
      } else {
        document.body.classList.remove('is-card-dragging');
        document.documentElement.style.overflow = '';
        document.body.style.overflow = '';
        if (previewSection) previewSection.style.touchAction = '';
      }
    }

    function onGlobalPointerMove(e) {
      if (!pointerReorder?.active || pointerReorder.pointerId !== e.pointerId) return;
      pointerReorder.lastX = e.clientX;
      pointerReorder.lastY = e.clientY;
      e.preventDefault();
      updatePointerReorderHover(e.clientX, e.clientY);
    }

    function onGlobalTouchMove(e) {
      if (!pointerReorder?.active || !pointerReorder.isTouch) return;
      e.preventDefault();
      const t = e.touches?.[0] || e.changedTouches?.[0];
      if (t) {
        pointerReorder.lastX = t.clientX;
        pointerReorder.lastY = t.clientY;
      }
    }

    function onGlobalPointerUp(e) {
      if (!pointerReorder?.active || pointerReorder.pointerId !== e.pointerId) return;
      finishPointerReorder(e);
    }

    function onGlobalPointerCancel(e) {
      if (!pointerReorder || pointerReorder.pointerId !== e.pointerId) return;
      cancelPointerReorder();
    }

    function attachGlobalDragListeners() {
      window.addEventListener('pointermove', onGlobalPointerMove, { passive: false });
      window.addEventListener('pointerup', onGlobalPointerUp);
      window.addEventListener('pointercancel', onGlobalPointerCancel);
      window.addEventListener('touchmove', onGlobalTouchMove, { passive: false, capture: true });
      if (previewSection) {
        previewSection.addEventListener('touchmove', onGlobalTouchMove, { passive: false, capture: true });
      }
    }

    function detachGlobalDragListeners() {
      window.removeEventListener('pointermove', onGlobalPointerMove);
      window.removeEventListener('pointerup', onGlobalPointerUp);
      window.removeEventListener('pointercancel', onGlobalPointerCancel);
      window.removeEventListener('touchmove', onGlobalTouchMove, { capture: true });
      if (previewSection) {
        previewSection.removeEventListener('touchmove', onGlobalTouchMove, { capture: true });
      }
    }

    function endPointerReorderSession() {
      stopDragScrollLoop();
      detachGlobalDragListeners();
      setScrollLocked(false);
    }

    function activatePointerDrag() {
      if (!pointerReorder || pointerReorder.active) return;
      pointerReorder.active = true;
      pointerReorder.cardEl.classList.add('is-dragging');
      if (pointerReorder.isTouch) {
        pointerReorder.cardEl.classList.add('is-drag-ready');
      }
      setScrollLocked(true);
      attachGlobalDragListeners();
      startDragScrollLoop();
      updatePointerReorderHover(pointerReorder.lastX, pointerReorder.lastY);
    }

    function updatePointerReorderHover(clientX, clientY) {
      if (!pointerReorder?.active) return;
      const drop = computeDropTarget(clientX, clientY, pointerReorder.id);
      previewGrid.querySelectorAll('.preview-card').forEach((el) => {
        el.classList.remove('is-drag-over');
      });
      if (!drop) {
        pointerReorder.dropTarget = null;
        return;
      }
      const targetEl = previewGrid.querySelector(`.preview-card[data-id="${drop.targetId}"]`);
      if (targetEl) targetEl.classList.add('is-drag-over');
      pointerReorder.dropTarget = drop;
    }

    function cancelPointerReorder() {
      clearDragHoldTimer();
      if (!pointerReorder) return;
      pointerReorder.cardEl.classList.remove('is-dragging', 'is-drag-ready');
      try { pointerReorder.cardEl.releasePointerCapture(pointerReorder.pointerId); } catch (_) {}
      pointerReorder = null;
      endPointerReorderSession();
      clearCardDragOverState();
    }

    function finishPointerReorder(e) {
      if (e?.type === 'pointercancel') return;
      clearDragHoldTimer();
      if (!pointerReorder) return;
      const { cardEl, id, active, pointerId, lastX, lastY, dropTarget, isTouch } = pointerReorder;
      cardEl.classList.remove('is-dragging', 'is-drag-ready');
      try { cardEl.releasePointerCapture(pointerId); } catch (_) {}
      pointerReorder = null;
      endPointerReorderSession();

      let drop = null;
      if (active) {
        drop = dropTarget;
        if (!drop) {
          const x = isTouch ? lastX : (e.clientX ?? lastX);
          const y = isTouch ? lastY : (e.clientY ?? lastY);
          drop = computeDropTarget(x, y, id);
        }
      }
      if (active && drop) {
        reorderCardsToTarget(id, drop.targetId);
        cardDragDidMove = true;
        setTimeout(() => { cardDragDidMove = false; }, 300);
      } else {
        clearCardDragOverState();
      }
    }

    previewGrid.addEventListener('contextmenu', (e) => {
      if (e.target.closest('.preview-card-img')) {
        e.preventDefault();
      }
    });

    previewGrid.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      const card = e.target.closest('.preview-card');
      const isTouch = isTouchPointerType(e.pointerType);
      if (!card || !canStartCardDrag(e.target, isTouch)) return;
      clearDragHoldTimer();
      pointerReorder = {
        id: Number(card.dataset.id),
        cardEl: card,
        startX: e.clientX,
        startY: e.clientY,
        lastX: e.clientX,
        lastY: e.clientY,
        dropTarget: null,
        active: false,
        holdDone: false,
        pointerId: e.pointerId,
        isTouch,
      };
      if (isTouch) {
        dragHoldTimer = setTimeout(() => {
          if (!pointerReorder || pointerReorder.pointerId !== e.pointerId) return;
          pointerReorder.holdDone = true;
          activatePointerDrag();
        }, TOUCH_HOLD_MS);
      }
      try { card.setPointerCapture(e.pointerId); } catch (_) {}
    });

    previewGrid.addEventListener('pointermove', (e) => {
      if (!pointerReorder || pointerReorder.pointerId !== e.pointerId) return;
      pointerReorder.lastX = e.clientX;
      pointerReorder.lastY = e.clientY;
      const dx = e.clientX - pointerReorder.startX;
      const dy = e.clientY - pointerReorder.startY;
      if (!pointerReorder.active) {
        if (pointerReorder.isTouch) {
          if (!pointerReorder.holdDone) {
            if (Math.hypot(dx, dy) > TOUCH_HOLD_CANCEL_PX) {
              cancelPointerReorder();
            }
            return;
          }
        } else if (Math.hypot(dx, dy) < MOUSE_DRAG_THRESHOLD) {
          return;
        } else {
          activatePointerDrag();
        }
      }
    }, { passive: false });

    previewGrid.addEventListener('pointerup', (e) => {
      if (!pointerReorder || pointerReorder.pointerId !== e.pointerId) return;
      if (pointerReorder.active) return;
      clearDragHoldTimer();
      pointerReorder = null;
    });

    previewGrid.addEventListener('pointercancel', (e) => {
      if (!pointerReorder || pointerReorder.pointerId !== e.pointerId) return;
      if (pointerReorder.active) return;
      cancelPointerReorder();
    });

    function adjustCardQuantity(card, action) {
      if (action === 'inc') {
        card.quantity = Math.min(999, card.quantity + 1);
      } else if (action === 'dec') {
        card.quantity = Math.max(0, card.quantity - 1);
      }
      renderPreview();
      updateUI();
    }

    previewGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const id = Number(btn.dataset.id);
      const card = cards.find(c => c.id === id);
      if (!card) return;

      if (btn.dataset.action === 'view') {
        if (cardDragDidMove) return;
        openImageLightbox(card);
        return;
      }
      if (btn.dataset.action === 'inc' || btn.dataset.action === 'dec') {
        if (Date.now() - lastQtyTouchAt < 400) return;
        adjustCardQuantity(card, btn.dataset.action);
        return;
      }
      if (btn.dataset.action === 'del') {
        const idx = cards.indexOf(card);
        cards.splice(idx, 1);
        renderPreview();
        updateUI();
      }
    });

    previewGrid.addEventListener('touchend', (e) => {
      const btn = e.target.closest('[data-action="inc"], [data-action="dec"]');
      if (!btn) return;
      e.preventDefault();
      lastQtyTouchAt = Date.now();
      const id = Number(btn.dataset.id);
      const card = cards.find(c => c.id === id);
      if (!card) return;
      adjustCardQuantity(card, btn.dataset.action);
    }, { passive: false });

    previewGrid.addEventListener('change', (e) => {
      if (e.target.tagName !== 'INPUT') return;
      const id = Number(e.target.dataset.id);
      const card = cards.find(c => c.id === id);
      if (!card) return;
      const val = parseInt(e.target.value, 10);
      card.quantity = isNaN(val) ? 0 : Math.max(0, Math.min(999, val));
      e.target.value = card.quantity;
      updateUI();
    });

    function expandCards() {
      const expanded = [];
      for (const card of cards) {
        for (let i = 0; i < card.quantity; i++) {
          expanded.push(card);
        }
      }
      return expanded;
    }

    function buildPageCards(flatSlice) {
      const pageCards = new Array(CARDS_PER_PAGE).fill(null);
      for (let slot = 0; slot < flatSlice.length && slot < CARDS_PER_PAGE; slot++) {
        pageCards[slot] = flatSlice[slot] || null;
      }
      return pageCards;
    }

    /** 左右翻轉（翻長邊）時，背面 slot 對應的正面 slot（每行左右鏡像） */
    function mirroredFrontSlotForBackSlot(backSlot) {
      const row = Math.floor(backSlot / 3);
      const col = backSlot % 3;
      return row * 3 + (2 - col);
    }

    function createCardElement(card) {
      const el = document.createElement('div');
      el.className = 'print-card';
      el.innerHTML = `<img src="${card.src}" alt="">`;
      return el;
    }

    function createBackCardElement() {
      const el = document.createElement('div');
      el.className = 'print-card';
      el.innerHTML = `<img src="${BACK_IMAGE_SRC}" alt="">`;
      return el;
    }

    function createEmptyCardSlot() {
      const el = document.createElement('div');
      el.className = 'print-card print-card-empty';
      el.setAttribute('aria-hidden', 'true');
      return el;
    }

    function createFrontPageElement(pageCards) {
      const page = document.createElement('div');
      page.className = 'print-page';

      const grid = document.createElement('div');
      grid.className = 'grid-container';

      for (let slot = 0; slot < CARDS_PER_PAGE; slot++) {
        grid.appendChild(pageCards[slot] ? createCardElement(pageCards[slot]) : createEmptyCardSlot());
      }

      page.appendChild(grid);
      return page;
    }

    function createBackPageElement(pageCards) {
      const page = document.createElement('div');
      page.className = 'print-page print-page-back';

      const grid = document.createElement('div');
      grid.className = 'grid-container';

      for (let backSlot = 0; backSlot < CARDS_PER_PAGE; backSlot++) {
        const frontSlot = mirroredFrontSlotForBackSlot(backSlot);
        grid.appendChild(pageCards[frontSlot] ? createBackCardElement() : createEmptyCardSlot());
      }

      page.appendChild(grid);
      return page;
    }

    function buildPrintLayout(target = printRoot, options = {}) {
      const { includeBackPages = false } = options;
      const flatCards = expandCards();
      if (flatCards.length === 0) return { ok: false };

      target.innerHTML = '';
      const frontPageCount = Math.ceil(flatCards.length / CARDS_PER_PAGE);

      for (let p = 0; p < frontPageCount; p++) {
        const slice = flatCards.slice(p * CARDS_PER_PAGE, (p + 1) * CARDS_PER_PAGE);
        const pageCards = buildPageCards(slice);

        target.appendChild(createFrontPageElement(pageCards));

        if (includeBackPages) {
          target.appendChild(createBackPageElement(pageCards));
        }
      }

      const totalPages = includeBackPages ? frontPageCount * 2 : frontPageCount;
      return {
        ok: true,
        pageCount: totalPages,
        frontPageCount,
        cardCount: flatCards.length,
        includeBackPages,
      };
    }

    function formatPreviewInfo(stats) {
      if (!stats) return '排版預覽';
      if (stats.includeBackPages) {
        return `排版預覽 · 共 ${stats.pageCount} 頁（${stats.frontPageCount} 正 + ${stats.frontPageCount} 背）· ${stats.cardCount} 張卡牌 · 雙面列印`;
      }
      return `排版預覽 · 共 ${stats.pageCount} 頁 · ${stats.cardCount} 張卡牌`;
    }

    function updateDoubleSidedButton() {
      btnDoubleSided.classList.toggle('is-active', doubleSidedPrint);
      btnDoubleSided.setAttribute('aria-pressed', doubleSidedPrint ? 'true' : 'false');
    }

    async function rebuildPreviewLayout() {
      const result = buildPrintLayout(previewRoot, { includeBackPages: doubleSidedPrint });
      if (!result.ok) return null;
      await waitForImages(previewRoot);
      lastPreviewStats = result;
      previewInfo.textContent = formatPreviewInfo(result);
      updateDoubleSidedButton();
      return result;
    }

    function closePreview() {
      previewOverlay.classList.remove('is-open');
      previewRoot.innerHTML = '';
      doubleSidedPrint = false;
      lastPreviewStats = null;
      updateDoubleSidedButton();
    }

    async function openPreview() {
      doubleSidedPrint = false;
      updateDoubleSidedButton();
      const result = await rebuildPreviewLayout();
      if (!result) return;
      previewOverlay.classList.add('is-open');
      document.querySelector('.preview-scroll').scrollTop = 0;
    }

    function waitForImages(root) {
      const imgs = root.querySelectorAll('img');
      return Promise.all(Array.from(imgs).map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }));
    }

    function getDeckData() {
      return {
        version: DECK_VERSION,
        name: getDeckDisplayName(),
        savedAt: new Date().toISOString(),
        cards: cards.map(({ name, src, quantity }) => ({ name, src, quantity })),
      };
    }

    function clearDeck() {
      cards.length = 0;
      nextId = 1;
      currentDeckPath = null;
      setDeckName(DEFAULT_DECK_NAME);
      previewGrid.innerHTML = '';
      printRoot.innerHTML = '';
      closePreview();
      updateUI();
    }

    function addDeckData(deckData) {
      if (!deckData || !Array.isArray(deckData.cards)) {
        throw new Error('無效的牌組檔案格式');
      }
      let added = 0;
      for (const item of deckData.cards) {
        if (!item.src) continue;
        cards.push({
          id: nextId++,
          name: item.name || 'card',
          src: item.src,
          quantity: Math.max(0, Math.min(999, Number(item.quantity) || 1)),
        });
        added += 1;
      }
      if (added === 0) {
        throw new Error('牌組檔案中沒有可加入的卡牌');
      }
      renderPreview();
      updateUI();
      return added;
    }

    deckNameInput.addEventListener('input', () => {
      currentDeckPath = null;
      updateUI();
    });

    btnPreview.addEventListener('click', openPreview);

    btnDoubleSided.addEventListener('click', async () => {
      if (!previewOverlay.classList.contains('is-open')) return;
      doubleSidedPrint = !doubleSidedPrint;
      await rebuildPreviewLayout();
    });

    btnClosePreview.addEventListener('click', closePreview);

    previewOverlay.addEventListener('click', (e) => {
      if (e.target === previewOverlay) closePreview();
    });

    btnCloseLightbox.addEventListener('click', closeImageLightbox);

    imageLightbox.addEventListener('click', (e) => {
      if (e.target === imageLightbox || e.target.classList.contains('image-lightbox-hint')) {
        closeImageLightbox();
      }
    });

    cardPickGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('.card-pick-item');
      if (!btn) return;
      closeCardPickOverlay(decodeURIComponent(btn.dataset.url));
    });

    btnSkipPick.addEventListener('click', () => closeCardPickOverlay(null));

    btnCancelPick.addEventListener('click', () => closeCardPickOverlay('__CANCEL__'));

    cardPickOverlay.addEventListener('click', (e) => {
      if (e.target === cardPickOverlay) closeCardPickOverlay(null);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (cardPickOverlay.classList.contains('is-open')) {
        closeCardPickOverlay(null);
        return;
      }
      if (importOverlay.classList.contains('is-open')) {
        closeImportDialog();
        return;
      }
      if (imageLightbox.classList.contains('is-open')) {
        closeImageLightbox();
        return;
      }
      if (previewOverlay.classList.contains('is-open')) {
        closePreview();
      }
    });

    btnPrint.addEventListener('click', async () => {
      const result = buildPrintLayout(printRoot, { includeBackPages: doubleSidedPrint });
      if (!result.ok) return;
      await waitForImages(printRoot);
      window.print();
    });

    btnPdf.addEventListener('click', async () => {
      const statusMsg = '正在產生 PDF…';
      deckStatus.textContent = statusMsg;
      previewInfo.textContent = statusMsg;
      btnPdf.disabled = true;
      try {
        const result = await downloadPdf();
        if (result?.ok) {
          const label = isElectron
            ? result.filePath.split('/').pop()
            : 'ptcg-cards.pdf';
          const okMsg = `已下載：${label}`;
          deckStatus.textContent = okMsg;
          previewInfo.textContent = okMsg;
        } else {
          const failMsg = 'PDF 產生失敗（無卡牌或已取消）';
          deckStatus.textContent = failMsg;
          previewInfo.textContent = failMsg;
        }
      } catch (err) {
        const errMsg = `PDF 失敗：${err?.message || '未知錯誤'}`;
        deckStatus.textContent = errMsg;
        previewInfo.textContent = errMsg;
      } finally {
        btnPdf.disabled = false;
        updateUI();
      }
    });

    btnSaveDeck.addEventListener('click', async () => {
      const result = await saveDeckFile(getDeckData());
      if (result.ok) {
        currentDeckPath = result.filePath;
        updateUI();
      }
    });

    btnImportDeck.addEventListener('click', openImportDialog);

    btnCancelImport.addEventListener('click', closeImportDialog);

    btnClearImport.addEventListener('click', () => {
      importText.value = '';
      setImportStatus('');
      importText.focus();
    });

    importOverlay.addEventListener('click', (e) => {
      if (e.target === importOverlay) closeImportDialog();
    });

    btnRunImport.addEventListener('click', async () => {
      const text = importText.value;
      if (!text.trim()) {
        setImportStatus('請貼上牌組文字', 'error');
        return;
      }
      setImportStatus('準備匯入…');
      try {
        const result = await importDeckFromText(text);
        if (!result.ok) {
          setImportStatus(result.error || '匯入失敗', 'error');
          if (result.summary?.added > 0) {
            deckStatus.textContent = `匯入未完成：已加入 ${result.summary.added} 張卡牌`;
          }
          return;
        }
        if (result.partial) {
          setImportStatus(result.message, 'warning');
          deckStatus.textContent = `匯入完成（部分失敗）：${result.message.replace(/\n/g, '；')}`;
          return;
        }
        closeImportDialog();
        setImportStatus('');
        deckStatus.textContent = `匯入完成：${result.message}`;
      } catch (err) {
        setImportStatus(`匯入失敗：${err.message}`, 'error');
      }
    });

    btnOpenDeck.addEventListener('click', async () => {
      const result = await openDeckFile();
      if (!result.ok) {
        if (result.error) alert(result.error);
        return;
      }
      try {
        const added = addDeckData(result.deckData);
        const deckLabel = result.deckData.name || deckNameFromFilePath(result.filePath);
        deckStatus.textContent = `已加入 ${added} 張卡牌（來自「${deckLabel}」）`;
        updateUI();
      } catch (err) {
        alert('無法加入牌組：' + err.message);
      }
    });

    btnClear.addEventListener('click', () => {
      if (cards.length === 0) return;
      if (!confirm('確定要清空目前牌組？此動作無法復原。')) return;
      clearDeck();
    });

    updateUI();
  </script>
</body>
</html>
